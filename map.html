<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Карта системы — China Space Live</title>
    <style>
        :root{--bg:rgba(10,10,18,0.7);--surface:rgba(17,17,34,0.75);--border:rgba(255,255,255,0.08);--red:#cc0000;--gold:#ffcc00;--text:#e0e0e0;--muted:#999}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:manipulation;user-select:none}
        #splash{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a0a2e 0%,#000010 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.6s}
        #splash.hidden{opacity:0;pointer-events:none}
        #splash .logo{width:100px;height:100px;position:relative;margin-bottom:25px}
        #splash .logo .ring{position:absolute;top:0;left:0;width:100%;height:100%;border:3px solid #4488ff;border-radius:50%;animation:spin 2s linear infinite}
        #splash .logo .ring2{position:absolute;top:15%;left:15%;width:70%;height:70%;border:2px solid #cc0000;border-radius:50%;animation:spin 3s linear infinite reverse}
        #splash .logo .dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:#fff;border-radius:50%}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        #splash h1{color:#fff;font-size:34px;font-weight:300;letter-spacing:3px;text-align:center}
        #splash h1 span{color:#4488ff;font-weight:700}
        #splash p{color:#888;margin-top:10px;font-size:15px;text-align:center;max-width:80%}
        #viewport{width:100%;height:100%}
        .hud-row{position:absolute;top:14px;left:16px;z-index:10;pointer-events:none;color:#fff;font-size:16px;font-weight:bold;text-shadow:0 0 8px rgba(0,0,0,0.8);display:flex;gap:12px;align-items:baseline}
        .hud-date{color:#fff}.hud-time{color:#ccc;font-size:14px;font-weight:normal}
        .btn-menu{position:absolute;top:10px;right:10px;background:var(--surface);border:1px solid var(--border);color:#ccc;padding:8px 14px;border-radius:8px;cursor:pointer;z-index:11;font-size:13px;backdrop-filter:blur(6px)}
        .btn-menu:hover{background:var(--red);border-color:var(--red);color:#fff}
        .bottom-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:10;color:#ccc;font-size:12px;background:var(--surface);padding:8px 16px;border-radius:10px;border:1px solid var(--border);backdrop-filter:blur(6px)}
        .bottom-bar input[type=range]{width:140px;accent-color:#cc0000}
        .bottom-bar button{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:#ccc;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
        .bottom-bar button.active,.bottom-bar button:hover{background:var(--red);border-color:var(--red);color:#fff}
        .bottom-bar .speed-text{color:#aaa;font-size:10px;min-width:70px;text-align:center}
        .info-panel{position:absolute;bottom:0;left:0;right:0;background:rgba(8,8,22,0.93);border-top:1px solid rgba(255,255,255,0.1);padding:18px 22px;z-index:10;max-height:52vh;overflow-y:auto;display:none;color:var(--text);backdrop-filter:blur(8px)}
        .info-panel.visible{display:block}
        .info-panel .close-btn{position:absolute;top:10px;right:16px;color:var(--muted);cursor:pointer;font-size:20px;z-index:2}
        .info-panel h2{color:#fff;font-size:20px;margin-bottom:4px}
        .info-panel .type-badge{display:inline-block;background:var(--red);color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;margin-bottom:8px;margin-right:8px}
        .info-panel .class-badge{display:inline-block;background:rgba(68,136,255,0.3);border:1px solid #4488ff;color:#4488ff;padding:2px 10px;border-radius:12px;font-size:11px;margin-bottom:8px}
        .info-panel .desc{color:#ccc;line-height:1.7;margin:8px 0;font-size:14px;max-width:900px}
        .info-panel .related{color:var(--muted);font-size:12px;margin-top:8px}
        .info-panel .moons-btn{display:inline-block;margin:8px 0 8px 12px;padding:8px 16px;background:rgba(68,136,255,0.2);border:1px solid #4488ff;color:#4488ff;border-radius:6px;cursor:pointer;font-size:13px}
        .info-panel .moon-link{display:block;padding:8px 12px;color:#4488ff;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04)}
        .info-panel .moon-link:hover{background:rgba(68,136,255,0.1)}
        .menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:20;display:none;justify-content:center;align-items:center;backdrop-filter:blur(3px)}
        .menu-overlay.visible{display:flex}
        .menu-box{background:rgba(12,12,28,0.94);border:1px solid var(--border);border-radius:14px;padding:22px;min-width:380px;max-width:540px;color:var(--text);backdrop-filter:blur(10px);max-height:80vh;overflow-y:auto}
        .menu-box h3{color:#fff;margin-bottom:14px;font-size:18px}
        .menu-box input[type=text]{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;padding:10px;border-radius:6px;font-size:14px;margin-bottom:10px}
        .menu-box .menu-list{max-height:300px;overflow-y:auto}
        .menu-box .menu-item{padding:10px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;font-size:14px;display:flex;justify-content:space-between}
        .menu-box .menu-item:hover{background:rgba(68,136,255,0.15)}
        .menu-box .menu-item .type{color:var(--muted);font-size:11px}
        .menu-box .lang-switch{display:flex;gap:8px;margin-bottom:14px}
        .menu-box .lang-switch button{flex:1;padding:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#ccc;border-radius:6px;cursor:pointer}
        .menu-box .lang-switch button.active{background:var(--red);border-color:var(--red);color:#fff}
        .menu-box .close-menu{float:right;color:var(--muted);cursor:pointer;font-size:18px}
        .menu-box .menu-action{display:block;width:100%;padding:10px;margin:6px 0;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#ccc;border-radius:6px;cursor:pointer;text-align:left;font-size:13px}
        .menu-box .menu-action:hover{background:rgba(68,136,255,0.15)}
        .menu-box .result{color:var(--gold);font-size:13px;margin:8px 0;padding:8px;background:rgba(255,204,0,0.08);border-radius:6px}
        .menu-box select{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;padding:10px;border-radius:6px;font-size:14px;margin:6px 0}
        .menu-box select option{background:#111;color:#fff}
    </style>
</head>
<body>
<div id="splash"><div class="logo"><div class="ring"></div><div class="ring2"></div><div class="dot"></div></div><h1>China<span>Space</span>Live</h1><p>Карта Солнечной системы в реальном времени</p></div>
<div class="hud-row"><span class="hud-date" id="hud-date"></span><span class="hud-time" id="hud-time"></span></div>
<button class="btn-menu" id="btn-menu" onclick="openMenu()">☰ Меню</button>
<div id="viewport"></div>
<div class="bottom-bar">
    <button id="btn-pause">⏸</button>
    <input type="range" id="speed-slider" min="-300" max="300" value="0" step="1">
    <button id="btn-live" class="active">● LIVE</button>
    <span class="speed-text" id="speed-text">LIVE</span>
</div>
<div class="info-panel" id="info-panel"><span class="close-btn" onclick="closeInfo()">✕</span><div id="info-content"></div></div>
<div class="menu-overlay" id="menu-overlay"><div class="menu-box" id="menu-box"></div></div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
setTimeout(()=>document.getElementById('splash').classList.add('hidden'),3000);

const container=document.getElementById('viewport');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x000011);
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.01,1e12);
const renderer=new THREE.WebGLRenderer({antialias:true,logarithmicDepthBuffer:true});renderer.setSize(container.clientWidth,container.clientHeight);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));container.appendChild(renderer.domElement);
const labelRenderer=new CSS2DRenderer();labelRenderer.setSize(container.clientWidth,container.clientHeight);labelRenderer.domElement.style.position='absolute';labelRenderer.domElement.style.top='0';labelRenderer.domElement.style.pointerEvents='none';container.appendChild(labelRenderer.domElement);

const STAR_SPHERE_R=1.2e8;
const starsGeo=new THREE.BufferGeometry();const sv=[];
for(let i=0;i<15000;i++){const r=STAR_SPHERE_R*0.9+Math.random()*STAR_SPHERE_R*0.1;const th=Math.random()*Math.PI*2;const ph=Math.acos(2*Math.random()-1);sv.push(r*Math.sin(ph)*Math.cos(th),r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph));}
starsGeo.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:5000})));

const texLoader=new THREE.TextureLoader();
const sunTex=texLoader.load('https://upload.wikimedia.org/wikipedia/commons/a/a4/Solarsystemscope_texture_8k_sun.jpg');
const sun=new THREE.Mesh(new THREE.SphereGeometry(6963.5,128,128),new THREE.MeshBasicMaterial({map:sunTex}));
scene.add(sun);sun.add(new THREE.PointLight(0xffffff,5,0,0));scene.add(new THREE.AmbientLight(0x333355,0.2));
sun.userData={name:'Солнце',key:'Sun',type:'Звезда',cls:'G2V',url:'https://science.nasa.gov/sun/',size:6963.5};

const refDate=new Date('2020-01-01T00:00:00Z').getTime();const msDay=86400000;const secPerYear=31557600;
let simTime=Date.now(),timeSpeed=0,isLive=true,isPaused=false,lastFrameTime=performance.now();
let currentLang='ru';let selectedKey='Sun';let objectsData={};

const speedSlider=document.getElementById('speed-slider');const btnLive=document.getElementById('btn-live');const btnPause=document.getElementById('btn-pause');
const speedText=document.getElementById('speed-text');const hudDate=document.getElementById('hud-date');const hudTime=document.getElementById('hud-time');

function speedFromSlider(v){return (v/100)*secPerYear;}
function formatSpeed(s){if(s===0)return'LIVE';const a=Math.abs(s);if(a>=86400)return'1 дн/с';if(a>=3600)return(s/3600).toFixed(1)+' ч/с';return s.toFixed(0)+' сек/с';}
function getSimDays(){return (simTime-refDate)/msDay;}

speedSlider.addEventListener('input',()=>{const v=parseFloat(speedSlider.value);if(v===0){isLive=true;timeSpeed=0;btnLive.classList.add('active');simTime=Date.now();isPaused=false;btnPause.textContent='⏸';}else{isLive=false;timeSpeed=speedFromSlider(v);btnLive.classList.remove('active');isPaused=false;btnPause.textContent='⏸';}lastFrameTime=performance.now();updateSpeedUI();});
btnLive.addEventListener('click',()=>{isLive=true;timeSpeed=0;speedSlider.value=0;btnLive.classList.add('active');simTime=Date.now();isPaused=false;btnPause.textContent='⏸';updateSpeedUI();});
btnPause.addEventListener('click',()=>{if(isLive){isLive=false;timeSpeed=0;speedSlider.value=0;btnLive.classList.remove('active');}isPaused=!isPaused;btnPause.textContent=isPaused?'▶':'⏸';lastFrameTime=performance.now();updateSpeedUI();});
function updateSpeedUI(){speedText.textContent=isPaused?'ПАУЗА':formatSpeed(timeSpeed);}

const T={
    mercury:'https://upload.wikimedia.org/wikipedia/commons/2/27/Solarsystemscope_texture_8k_mercury.jpg',venus:'https://upload.wikimedia.org/wikipedia/commons/5/57/Solarsystemscope_texture_4k_venus_atmosphere.jpg',
    earthDay:'https://i.postimg.cc/VvdQdfF6/Daytime_Earth.jpg',earthNight:'https://i.postimg.cc/brscsyRy/Night_Earth.jpg',mars:'https://upload.wikimedia.org/wikipedia/commons/4/46/Solarsystemscope_texture_2k_mars.jpg',
    jupiter:'https://upload.wikimedia.org/wikipedia/commons/0/02/Jupiter_Texture_Map_%28Hubble_2024%29.png',saturn:'https://upload.wikimedia.org/wikipedia/commons/8/8d/Saturn_Equirectangular_Texture_-_8192x4096.png',
    saturnRing:'https://upload.wikimedia.org/wikipedia/commons/2/29/Solarsystemscope_texture_8k_saturn_ring_alpha.png',uranus:'https://upload.wikimedia.org/wikipedia/commons/9/95/Solarsystemscope_texture_2k_uranus.jpg',
    neptune:'https://upload.wikimedia.org/wikipedia/commons/1/1e/Solarsystemscope_texture_2k_neptune.jpg',moon:'https://upload.wikimedia.org/wikipedia/commons/d/d1/Solarsystemscope_texture_8k_moon.jpg',
    io:'https://i.postimg.cc/QN1nJY6q/Io.jpg',europa:'https://i.postimg.cc/TwRhN4rz/Europa-(moon).jpg',ganymede:'https://upload.wikimedia.org/wikipedia/commons/8/81/Ganymede_map_by_Askaniy.png',
    callisto:'https://upload.wikimedia.org/wikipedia/commons/a/a1/Callisto_map_by_Askaniy.png',titan:'https://i.postimg.cc/ry4FCcXZ/Titan.jpg',
    enceladus:'https://i.postimg.cc/1tp2Xv23/enceladus-texture-2k-by-ducn1567-dgs71te-fullview.jpg',mimas:'https://i.postimg.cc/RC83TGDq/Mimas.jpg',
    titania:'https://i.postimg.cc/NfZBVz67/1000029150.jpg',oberon:'https://i.postimg.cc/tRMjZMMb/Oberon.jpg',
    triton:'https://i.postimg.cc/L4xvDdtX/triton-texture-map-14k-by-askaniy-dcln18g-fullview.jpg',pluto:'https://i.postimg.cc/rsvLtDgr/1000029132.jpg',
    charon:'https://i.postimg.cc/XNtLmfzz/charon-by-trappist1e-deenzk8-pre.jpg',ceres:'https://upload.wikimedia.org/wikipedia/commons/2/2f/Solarsystemscope_texture_4k_ceres_fictional.jpg',
    phobos:'https://upload.wikimedia.org/wikipedia/commons/3/30/Phobos_map_by_Askaniy.png',deimos:'https://upload.wikimedia.org/wikipedia/commons/6/6b/Deimos_color_map.jpg'
};

const earthShader=new THREE.ShaderMaterial({
    uniforms:{dayTex:{value:texLoader.load(T.earthDay)},nightTex:{value:texLoader.load(T.earthNight)},sunPos:{value:new THREE.Vector3()}},
    vertexShader:`varying vec2 vUv;varying vec3 vWorldPos;varying vec3 vWorldNormal;void main(){vec4 wp=modelMatrix*vec4(position,1.0);vWorldPos=wp.xyz;vWorldNormal=normalize(mat3(modelMatrix)*normal);vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec2 vUv;varying vec3 vWorldPos;varying vec3 vWorldNormal;uniform sampler2D dayTex;uniform sampler2D nightTex;uniform vec3 sunPos;void main(){vec3 toSun=normalize(sunPos-vWorldPos);float l=dot(normalize(vWorldNormal),toSun);float m=smoothstep(-0.15,0.25,l);vec4 d=texture2D(dayTex,vUv);vec4 n=texture2D(nightTex,vUv);vec4 c=mix(n,d,m);c.rgb+=n.rgb*0.06;gl_FragColor=c;}`
});

const planetSpinGroups=[],moonDataArr=[],allBodies=[],orbitRings=[];
allBodies.push({name:'Солнце',obj:sun,type:'Звезда',cls:'G2V',url:'https://science.nasa.gov/sun/',key:'Sun',size:6963.5});

const planetDefs=[
    {name:'Меркурий',orbit:579000,size:24.4,tex:T.mercury,period:87.969,angle0:4.429,rotPeriod:1407.6,axialTilt:0.034,cls:'Планета земного типа',url:'https://science.nasa.gov/mercury/',key:'Mercury'},
    {name:'Венера',orbit:1082000,size:60.5,tex:T.venus,period:224.701,angle0:1.745,rotPeriod:-5832.5,axialTilt:177.4,cls:'Сверхгорячая углекислотная планета',url:'https://science.nasa.gov/venus/',key:'Venus'},
    {name:'Земля',orbit:1496000,size:63.7,isEarth:true,period:365.256,angle0:1.571,rotPeriod:24,axialTilt:23.44,cls:'Планета земного типа с жизнью',url:'https://science.nasa.gov/earth/',key:'Earth'},
    {name:'Марс',orbit:2279000,size:33.9,tex:T.mars,period:686.980,angle0:5.934,rotPeriod:24.6,axialTilt:25.19,cls:'Планета земного типа',url:'https://science.nasa.gov/mars/',key:'Mars'},
    {name:'Церера',orbit:4140000,size:4.7,tex:T.ceres,period:1680,angle0:2.1,axialTilt:4,cls:'Карликовая планета',url:'https://science.nasa.gov/dwarf-planets/ceres/',key:'Ceres'},
    {name:'Юпитер',orbit:7786000,size:699.1,tex:T.jupiter,period:4332.59,angle0:4.774,rotPeriod:9.93,axialTilt:3.13,cls:'Газовый гигант, класс I',url:'https://science.nasa.gov/jupiter/',key:'Jupiter'},
    {name:'Сатурн',orbit:14335000,size:582.3,tex:T.saturn,period:10759.22,angle0:5.236,rotPeriod:10.7,axialTilt:26.73,hasRing:true,cls:'Газовый гигант',url:'https://science.nasa.gov/saturn/',key:'Saturn'},
    {name:'Уран',orbit:28725000,size:253.6,tex:T.uranus,period:30688.5,angle0:0.785,rotPeriod:-17.2,axialTilt:97.77,cls:'Ледяной гигант',url:'https://science.nasa.gov/uranus/',key:'Uranus'},
    {name:'Нептун',orbit:44951000,size:246.2,tex:T.neptune,period:60182,angle0:3.665,rotPeriod:16.1,axialTilt:28.32,cls:'Ледяной гигант, холодный Нептун',url:'https://science.nasa.gov/neptune/',key:'Neptune'},
    {name:'Плутон',orbit:59064000,size:11.9,tex:T.pluto,period:90560,angle0:2.268,rotPeriod:-153.3,axialTilt:122.5,cls:'Карликовая планета',url:'https://science.nasa.gov/dwarf-planets/pluto/',key:'Pluto'}
];

const planetInfo={};
planetDefs.forEach(p=>{
    let mat;if(p.isEarth)mat=earthShader;else if(p.tex)mat=new THREE.MeshPhongMaterial({map:texLoader.load(p.tex),specular:0x111111,shininess:5});else mat=new THREE.MeshPhongMaterial({color:0x888888});
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(p.size,48,48),mat);mesh.userData=p;
    const spinGroup=new THREE.Group();spinGroup.add(mesh);scene.add(spinGroup);
    const tiltRad=(p.axialTilt||0)*Math.PI/180;spinGroup.rotation.z=tiltRad;
    const moonGroup=new THREE.Group();moonGroup.rotation.z=tiltRad;spinGroup.add(moonGroup);
    const lbl=new CSS2DObject(Object.assign(document.createElement('div'),{textContent:p.name}));lbl.element.style.color='#ccc';lbl.element.style.fontSize='12px';mesh.add(lbl);
    allBodies.push({name:p.name,obj:spinGroup,type:'Планета',cls:p.cls,url:p.url,key:p.key,size:p.size});planetSpinGroups.push({group:spinGroup,mesh,data:p});
    const orbPts=[];for(let i=0;i<=512;i++){const a=(i/512)*Math.PI*2;orbPts.push(new THREE.Vector3(Math.cos(a)*p.orbit,0,Math.sin(a)*p.orbit));}
    const orbLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(orbPts),new THREE.LineBasicMaterial({color:0x8899bb,transparent:true,opacity:0.9}));
    scene.add(orbLine);orbitRings.push({ring:orbLine,planet:spinGroup});
    if(p.hasRing){const rt=texLoader.load(T.saturnRing);const ir=p.size*1.3,oR=p.size*2.5;const rg=new THREE.RingGeometry(ir,oR,256);const pos=rg.attributes.position,uv=rg.attributes.uv;for(let i=0;i<pos.count;i++){const x=pos.getX(i),y=pos.getY(i),r=Math.sqrt(x*x+y*y);uv.setXY(i,(r-ir)/(oR-ir),0.5);}const rm=new THREE.Mesh(rg,new THREE.MeshBasicMaterial({map:rt,side:THREE.DoubleSide,transparent:true,opacity:0.8}));rm.rotation.x=-Math.PI/2;mesh.add(rm);}
    planetInfo[p.name]={spinGroup,mesh,data:p,moonGroup};
});

const moonDefs=[
    {parent:'Земля',moons:[{name:'Луна',orbit:3844,size:17.4,tex:T.moon,period:27.322,angle0:0.5,cls:'Спутник земного типа',url:'https://science.nasa.gov/moon/',key:'Moon'}]},
    {parent:'Марс',moons:[{name:'Фобос',orbit:94,size:0.11,tex:T.phobos,period:0.319,cls:'Захваченный астероид',key:'Phobos'},{name:'Деймос',orbit:235,size:0.06,tex:T.deimos,period:1.263,cls:'Захваченный астероид',key:'Deimos'}]},

window.addEventListener('mouseup',()=>isDrag=false);
window.addEventListener('mousemove',e=>{if(isDrag){camAngle-=(e.clientX-ltX)*0.005;camPolar=Math.max(-1.5,Math.min(1.5,camPolar+(e.clientY-ltY)*0.005));ltX=e.clientX;ltY=e.clientY;}});
let camAngle=0,camPolar=0.4;

function animate(timestamp){
    requestAnimationFrame(animate);
    if(isLive){simTime=Date.now();}else if(!isPaused){const dt=timestamp-lastFrameTime;if(dt>0&&dt<1000)simTime+=dt*timeSpeed/1000;}
    lastFrameTime=timestamp;const days=getSimDays();
    hudDate.textContent=new Date(simTime).toLocaleDateString(currentLang==='zh'?'zh-CN':currentLang,{year:'numeric',month:'long',day:'numeric'});
    hudTime.textContent=new Date(simTime).toLocaleTimeString(currentLang==='zh'?'zh-CN':currentLang,{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    updateSpeedUI();
    planetSpinGroups.forEach(sg=>{
        const pd=sg.data;
        if(pd.orbit){const a=pd.angle0+(days/pd.period)*Math.PI*2;sg.group.position.set(Math.cos(a)*pd.orbit,0,Math.sin(a)*pd.orbit);}
        if(pd.rotPeriod){sg.mesh.rotation.y=(pd.rotAngle0||0)+(days*24/Math.abs(pd.rotPeriod))*Math.PI*2*(pd.rotPeriod<0?-1:1);}
    });
    moonDataArr.forEach(mm=>{const md=mm.userData;const pinfo=md.parentInfo;if(!pinfo)return;const pp=pinfo.spinGroup.position.clone();const tr=(pinfo.data.axialTilt||0)*Math.PI/180;mm.position.copy(moonWorldPos(md,pp,tr,(md.angle0||0)+(days/md.period)*Math.PI*2));});
    // Искусственные спутники
    satMarkers.forEach(s=>{
        const sat=s.userData.data;if(!sat.parent)return;
        const pb=allBodies.find(b=>b.name===sat.parent||b.key===sat.parent);
        if(pb&&sat.orbit_km){const pp=pb.obj.position.clone();const orb=(6371+sat.orbit_km)/100;const a=(sat.angle0_rad||0)+(days/(sat.period_days||1))*Math.PI*2;s.position.set(pp.x+Math.cos(a)*orb,pp.y,pp.z+Math.sin(a)*orb);}
        s.userData.history.push(s.position.clone());if(s.userData.history.length>200)s.userData.history.shift();
    });
    // Хвосты
    satTrails.forEach(st=>{
        const hist=st.sprite.userData.history;
        if(hist.length<2)return;
        const pts=hist.slice();
        st.line.geometry.dispose();st.line.geometry=new THREE.BufferGeometry().setFromPoints(pts);
    });
    orbitRings.forEach(o=>{o.ring.visible=camera.position.distanceTo(o.planet.position)>1000;});
    if(currentTarget){const tp=currentTarget.position.clone();const dist=Math.pow(10,camLogDist);const cp=new THREE.Vector3(tp.x+Math.cos(camAngle)*Math.cos(camPolar)*dist,tp.y+Math.sin(camPolar)*dist,tp.z+Math.sin(camAngle)*Math.cos(camPolar)*dist);if(cp.length()>STAR_SPHERE_R*0.85)cp.normalize().multiplyScalar(STAR_SPHERE_R*0.85);camera.position.lerp(cp,0.05);camera.lookAt(tp);}
    earthShader.uniforms.sunPos.value.copy(sun.position);renderer.render(scene,camera);labelRenderer.render(scene,camera);
}
requestAnimationFrame(animate);
window.addEventListener('resize',()=>{camera.aspect=container.clientWidth/container.clientHeight;camera.updateProjectionMatrix();renderer.setSize(container.clientWidth,container.clientHeight);labelRenderer.setSize(container.clientWidth,container.clientHeight);});
</script>
</body>
</html>
