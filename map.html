<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта системы — China Space Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #viewport { width: 100%; height: 100%; }
        .topbar { position: absolute; top: 0; left: 0; right: 0; background: rgba(8,8,22,0.9); border-bottom: 1px solid #1a1a3a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; color: #ccc; z-index: 10; }
        .topbar a { color: #cc0000; text-decoration: none; font-weight: bold; }
        .topbar a:hover { text-decoration: underline; }
        .info-popup { position: absolute; bottom: 20px; right: 20px; background: rgba(17,17,34,0.95); border: 1px solid #cc0000; padding: 20px; border-radius: 10px; color: #e0e0e0; max-width: 350px; display: none; z-index: 10; }
        .info-popup h3 { color: #fff; margin-bottom: 10px; }
        .info-popup p { margin: 5px 0; font-size: 14px; }
        .info-popup .close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #888; font-size: 18px; }
        .label3d { position: absolute; color: #ccc; font-size: 12px; pointer-events: none; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
<div class="topbar"><span>🌌 Карта Солнечной системы — China Space Live</span><a href="index.html">← На главную</a></div>
<div id="viewport"></div>
<div class="info-popup" id="info-popup"><span class="close" onclick="document.getElementById('info-popup').style.display='none'">✕</span><div id="info-content"></div></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);
const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 300000);
camera.position.set(0, 400, 600);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.maxDistance = 80000;
controls.minDistance = 5;

// Звёзды
const starsGeo = new THREE.BufferGeometry();
const sv = [];
for (let i=0;i<8000;i++){const r=50000+Math.random()*30000,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);sv.push(r*Math.sin(ph)*Math.cos(th),r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph));}
starsGeo.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:3})));

// Солнце
const sunGeo = new THREE.SphereGeometry(10,32,32);
const sunMat = new THREE.MeshBasicMaterial({color:0xffff00});
const sun = new THREE.Mesh(sunGeo, sunMat);
scene.add(sun);
const sunLight = new THREE.PointLight(0xffffff, 2, 0, 0);
sun.add(sunLight);
scene.add(new THREE.AmbientLight(0x222244, 0.3));

const sunLabel = new CSS2DObject(document.createElement('div'));
sunLabel.element.textContent = 'Солнце';
sunLabel.element.style.color = '#ffff00'; sunLabel.element.style.fontWeight = 'bold';
sun.add(sunLabel);

// Планеты
const planets = [
    {name:'Меркурий',orbit:30,size:0.4,color:0xaaaaaa,period:88},
    {name:'Венера',orbit:55,size:1,color:0xffcc88,period:225},
    {name:'Земля',orbit:78,size:1.1,color:0x4488ff,period:365},
    {name:'Марс',orbit:100,size:0.6,color:0xff4422,period:687},
    {name:'Юпитер',orbit:180,size:5,color:0xffcc88,period:4333,
        moons:[
            {name:'Ио',orbit:8,size:0.15,color:0xffff00,period:1.77},
            {name:'Европа',orbit:11,size:0.13,color:0xccccff,period:3.55},
            {name:'Ганимед',orbit:14,size:0.2,color:0xaaaaaa,period:7.15},
            {name:'Каллисто',orbit:17,size:0.18,color:0x888888,period:16.69}
        ]},
    {name:'Сатурн',orbit:260,size:4,color:0xffdd88,period:10759,
        moons:[
            {name:'Титан',orbit:10,size:0.2,color:0xffcc88,period:15.95},
            {name:'Энцелад',orbit:7,size:0.08,color:0xffffff,period:1.37},
            {name:'Мимас',orbit:5,size:0.06,color:0xcccccc,period:0.94}
        ]},
    {name:'Уран',orbit:340,size:2.5,color:0x88ccff,period:30687,
        moons:[
            {name:'Титания',orbit:6,size:0.12,color:0xaaaacc,period:8.71},
            {name:'Оберон',orbit:8,size:0.1,color:0x8888aa,period:13.46}
        ]},
    {name:'Нептун',orbit:400,size:2.3,color:0x4466ff,period:60190,
        moons:[{name:'Тритон',orbit:7,size:0.15,color:0xcccccc,period:5.88}]},
    {name:'Плутон',orbit:460,size:0.3,color:0xccbbaa,period:90560,
        moons:[{name:'Харон',orbit:2,size:0.08,color:0x888888,period:6.39}]}
];

const planetMeshes = [];
const J2000 = Date.UTC(2000,0,1,12,0,0);
const msPerDay = 86400000;
function getDay() { return (Date.now() - J2000) / msPerDay; }

planets.forEach(p => {
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.size,16,16), new THREE.MeshPhongMaterial({color:p.color}));
    mesh.userData = p;
    scene.add(mesh);
    planetMeshes.push(mesh);
    
    const lbl = new CSS2DObject(document.createElement('div'));
    lbl.element.textContent = p.name;
    lbl.element.style.color = '#ccc'; lbl.element.style.fontSize = '11px';
    mesh.add(lbl);
    
    const ringGeo = new THREE.TorusGeometry(p.orbit,0.1,16,128);
    scene.add(new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({color:0x333355,transparent:true,opacity:0.3}))).rotation.x = Math.PI/2;
    
    // Спутники
    if (p.moons) {
        p.moons.forEach(m => {
            const mm = new THREE.Mesh(new THREE.SphereGeometry(m.size,8,8), new THREE.MeshPhongMaterial({color:m.color}));
            mm.userData = {name:m.name, parent:p, orbit:m.orbit, period:m.period};
            scene.add(mm);
            planetMeshes.push(mm);
            
            const mlbl = new CSS2DObject(document.createElement('div'));
            mlbl.element.textContent = m.name;
            mlbl.element.style.color = '#999'; mlbl.element.style.fontSize = '9px';
            mm.add(mlbl);
        });
    }
});

// Земля — добавим Луну
const earthRef = planetMeshes.find(m=>m.userData.name==='Земля');
const moon = new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8), new THREE.MeshPhongMaterial({color:0xcccccc}));
moon.userData = {name:'Луна', parent:earthRef.userData, orbit:2.5, period:27.3, desc:'Естественный спутник Земли'};
scene.add(moon);
planetMeshes.push(moon);
const moonLbl = new CSS2DObject(document.createElement('div'));
moonLbl.element.textContent = 'Луна'; moonLbl.element.style.color = '#999'; moonLbl.element.style.fontSize = '9px';
moon.add(moonLbl);

// Сатурн — кольцо
const saturnMesh = planetMeshes.find(m=>m.userData.name==='Сатурн');
if (saturnMesh) {
    const satRing = new THREE.Mesh(new THREE.TorusGeometry(6,0.8,16,64), new THREE.MeshBasicMaterial({color:0xffdd88,transparent:true,opacity:0.4,side:THREE.DoubleSide}));
    saturnMesh.add(satRing);
    satRing.rotation.x = Math.PI/2.2;
}

// Клик
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
container.addEventListener('click',e=>{
    mouse.x = (e.clientX/container.clientWidth)*2-1;
    mouse.y = -(e.clientY/container.clientHeight)*2+1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(planetMeshes);
    if(hits.length>0){
        const obj = hits[0].object;
        const popup = document.getElementById('info-popup');
        document.getElementById('info-content').innerHTML = `<h3>${obj.userData.name||'Объект'}</h3><p>${obj.userData.desc||'Планета'}</p><p>Период: ${obj.userData.period?obj.userData.period+' дней':'Н/Д'}</p>`;
        popup.style.display = 'block';
    }
});

function animate() {
    requestAnimationFrame(animate);
    const day = getDay();
    
    planetMeshes.forEach(mesh => {
        const p = mesh.userData;
        if (p.parent && p.orbit) {
            // Спутник
            const parentMesh = planetMeshes.find(m=>m.userData===p.parent) || (p.parent===earthRef.userData?earthRef:null);
            if (parentMesh) {
                const a = (day / p.period) * Math.PI * 2;
                mesh.position.set(
                    parentMesh.position.x + Math.cos(a)*p.orbit,
                    parentMesh.position.y,
                    parentMesh.position.z + Math.sin(a)*p.orbit
                );
            }
        } else if (p.orbit && p.period) {
            // Планета
            const a = (day / p.period) * Math.PI * 2;
            mesh.position.set(Math.cos(a)*p.orbit, 0, Math.sin(a)*p.orbit);
            mesh.rotation.y += 0.001;
        }
    });
    
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect = container.clientWidth/container.clientHeight; camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
    labelRenderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
