<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта системы — China Space Live</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #000; height: 100vh; overflow: hidden; }
        #viewport { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="topbar">
    <span>🌌 Карта системы — China Space Live</span>
    <a href="index.html">← На главную</a>
</div>

<div id="viewport"></div>

<div class="speed-control">
    Скорость камеры: <input type="range" min="1" max="50" value="5" id="speed-slider">
    <span id="speed-val">5x</span>
</div>

<div class="info-popup" id="info-popup">
    <span class="close" onclick="document.getElementById('info-popup').style.display='none'">✕</span>
    <div id="info-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="js/map.js"></script>
</body>
</html>
