<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта системы — China Space Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #viewport { width: 100%; height: 100%; }
        
        .topbar {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(8,8,22,0.95); border-bottom: 1px solid #1a1a3a;
            padding: 10px 20px; display: flex; justify-content: space-between;
            align-items: center; color: #ccc; z-index: 100; font-size: 14px;
        }
        .topbar a { color: #cc0000; text-decoration: none; font-weight: bold; padding: 8px 16px; border: 1px solid #cc0000; border-radius: 4px; }
        .topbar a:hover { background: #cc0000; color: #fff; }
        
        .speed-control {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(8,8,22,0.9); border: 1px solid #333; border-radius: 8px;
            padding: 12px 20px; color: #ccc; z-index: 100; display: flex; align-items: center; gap: 15px;
        }
        .speed-control button {
            background: #222; color: #fff; border: 1px solid #555; padding: 8px 16px;
            border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold;
        }
        .speed-control button:hover { background: #cc0000; }
        .speed-control span { font-size: 14px; min-width: 60px; text-align: center; }
        
        .info-popup {
            position: absolute; top: 80px; right: 20px;
            background: rgba(17,17,34,0.97); border: 1px solid #cc0000;
            padding: 20px; border-radius: 10px; color: #e0e0e0; max-width: 350px;
            display: none; z-index: 100; font-size: 13px; line-height: 1.6;
        }
        .info-popup h3 { color: #ffcc00; margin-bottom: 10px; font-size: 16px; }
        .info-popup .close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #888; font-size: 20px; }

        .labels-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .label-2d { position: absolute; color: #fff; font-size: 11px; text-shadow: 0 0 4px #000; transform: translate(-50%,-50%); white-space: nowrap; }
    </style>
</head>
<body>

<div class="topbar">
    <span>🌌 КАРТА СОЛНЕЧНОЙ СИСТЕМЫ — China Space Live · Масштаб: 1:1 000 000</span>
    <a href="index.html">← НА ГЛАВНУЮ</a>
</div>

<div id="viewport"></div>

<div class="labels-container" id="labels-container"></div>

<div class="speed-control">
    <button onclick="changeSpeed(-1)">−</button>
    <span id="speed-display">×1.0</span>
    <button onclick="changeSpeed(+1)">+</button>
    <span style="font-size:11px;color:#888;">Скорость камеры</span>
</div>

<div class="info-popup" id="info-popup">
    <span class="close" onclick="document.getElementById('info-popup').style.display='none'">✕</span>
    <div id="info-content"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.01, 1000000);
camera.position.set(0, 200, 400);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 500000;
controls.zoomSpeed = 0.8;
controls.rotateSpeed = 0.3;
controls.target.set(0,0,0);

// Скорость камеры
let camSpeed = 1.0;
window.changeSpeed = function(dir) {
    camSpeed = Math.max(0.1, Math.min(10, camSpeed + dir * 0.5));
    controls.zoomSpeed = 0.8 * camSpeed;
    controls.rotateSpeed = 0.3 * camSpeed;
    document.getElementById('speed-display').textContent = '×' + camSpeed.toFixed(1);
};

// Звёздная сфера
const starsGeo = new THREE.BufferGeometry();
const sv = [];
for (let i=0; i<12000; i++) {
    const r = 400000 + Math.random()*100000;
    const th = Math.random()*Math.PI*2;
    const ph = Math.acos(2*Math.random()-1);
    sv.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
const starsMat = new THREE.PointsMaterial({color:0xffffff, size:5, sizeAttenuation:false});
scene.add(new THREE.Points(starsGeo, starsMat));

// Солнце
const sunTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/sun.jpg');
const sunGeo = new THREE.SphereGeometry(6.96, 64, 64); // радиус Солнца ~696000 км, масштаб 1:100000
const sun = new THREE.Mesh(sunGeo, new THREE.MeshBasicMaterial({map:sunTex}));
scene.add(sun);
const sunLight = new THREE.PointLight(0xffffff, 3, 0, 0);
sun.add(sunLight);
scene.add(new THREE.AmbientLight(0x111122, 0.3));

// Текстуры
const texLoader = new THREE.TextureLoader();
const textures = {
    mercury: texLoader.load('https://threejs.org/examples/textures/planets/mercury.jpg'),
    venus: texLoader.load('https://threejs.org/examples/textures/planets/venus_atmo.jpg'),
    earth: texLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'),
    mars: texLoader.load('https://threejs.org/examples/textures/planets/mars.jpg'),
    jupiter: texLoader.load('https://threejs.org/examples/textures/planets/jupiter.jpg'),
    saturn: texLoader.load('https://threejs.org/examples/textures/planets/saturn.jpg'),
    uranus: texLoader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/textures/planets/uranus.jpg'),
    neptune: texLoader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/textures/planets/neptune.jpg'),
    moon: texLoader.load('https://threejs.org/examples/textures/planets/moon.jpg')
};

// Масштаб: 1 единица Three.js = 10 000 км реальных
const SCALE = 10000; // 1 unit = 10000 km

// Планеты: { name, distance_km, radius_km, color, texture, period_days, moons }
const planetData = [
    { name:'Меркурий', dist:57900000, radius:2440, tex:'mercury', period:88, moons:[] },
    { name:'Венера', dist:108200000, radius:6052, tex:'venus', period:225, moons:[] },
    { name:'Земля', dist:149600000, radius:6371, tex:'earth', period:365, moons:[
        {name:'Луна', dist:384400, radius:1737, tex:'moon', period:27.3}
    ]},
    { name:'Марс', dist:227900000, radius:3390, tex:'mars', period:687, moons:[
        {name:'Фобос', dist:9376, radius:11, period:0.32},
        {name:'Деймос', dist:23460, radius:6, period:1.26}
    ]},
    { name:'Юпитер', dist:778600000, radius:69911, tex:'jupiter', period:4333, moons:[
        {name:'Ио', dist:421800, radius:1821, period:1.77},
        {name:'Европа', dist:671100, radius:1561, period:3.55},
        {name:'Ганимед', dist:1070400, radius:2634, period:7.15},
        {name:'Каллисто', dist:1882700, radius:2410, period:16.69},
        {name:'Амальтея', dist:181400, radius:84, period:0.50},
        {name:'Гималия', dist:11461000, radius:85, period:250.6},
        {name:'Элара', dist:11741000, radius:43, period:259.6},
        {name:'Пасифе', dist:23624000, radius:30, period:743.6},
        {name:'Синопе', dist:23779000, radius:19, period:758.9},
        {name:'Лиситея', dist:11717000, radius:18, period:259.2},
        {name:'Карме', dist:23404000, radius:23, period:734.2},
        {name:'Ананке', dist:21276000, radius:14, period:629.8},
        {name:'Леда', dist:11165000, radius:10, period:240.9},
        {name:'Фемисто', dist:7507000, radius:4, period:130.0},
        {name:'Каллирое', dist:24103000, radius:4, period:758.8}
    ]},
    { name:'Сатурн', dist:1434000000, radius:58232, tex:'saturn', period:10759, moons:[
        {name:'Титан', dist:1222000, radius:2575, period:15.95},
        {name:'Рея', dist:527000, radius:764, period:4.52},
        {name:'Япет', dist:3561000, radius:735, period:79.33},
        {name:'Диона', dist:377400, radius:561, period:2.74},
        {name:'Тефия', dist:294700, radius:531, period:1.89},
        {name:'Энцелад', dist:238000, radius:252, period:1.37},
        {name:'Мимас', dist:185500, radius:198, period:0.94},
        {name:'Гиперион', dist:1481000, radius:135, period:21.28},
        {name:'Феба', dist:12944000, radius:106, period:550.3}
    ]},
    { name:'Уран', dist:2871000000, radius:25362, tex:'uranus', period:30687, moons:[
        {name:'Титания', dist:435900, radius:789, period:8.71},
        {name:'Оберон', dist:583500, radius:761, period:13.46},
        {name:'Умбриэль', dist:266000, radius:585, period:4.14},
        {name:'Ариэль', dist:191000, radius:579, period:2.52},
        {name:'Миранда', dist:129800, radius:236, period:1.41}
    ]},
    { name:'Нептун', dist:4495000000, radius:24622, tex:'neptune', period:60190, moons:[
        {name:'Тритон', dist:354800, radius:1353, period:5.88},
        {name:'Протей', dist:117600, radius:210, period:1.12},
        {name:'Нереида', dist:5513800, radius:170, period:360.1}
    ]}
];

const planetMeshes = [];
const allLabels = [];

function createPlanet(pData) {
    const group = new THREE.Group();
    const dist = pData.dist / SCALE;
    const radius = Math.max(0.1, pData.radius / SCALE * 2); // немного увеличены для видимости
    
    const tex = textures[pData.tex];
    const geo = new THREE.SphereGeometry(radius, 32, 32);
    const mat = tex 
        ? new THREE.MeshStandardMaterial({map:tex, roughness:0.8})
        : new THREE.MeshStandardMaterial({color:0x888888, roughness:0.8});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
    
    mesh.userData = {
        name: pData.name,
        orbit: dist,
        period: pData.period,
        angle: Math.random() * Math.PI * 2,
        desc: `${pData.name}\nРасстояние от Солнца: ${(pData.dist/1000000).toFixed(1)} млн км\nРадиус: ${pData.radius} км\nПериод обращения: ${pData.period} дней`
    };
    
    // Орбита
    const orbitGeo = new THREE.TorusGeometry(dist, 0.05, 8, 256);
    const orbitRing = new THREE.Mesh(orbitGeo, new THREE.MeshBasicMaterial({color:0x222244, transparent:true, opacity:0.4}));
    orbitRing.rotation.x = Math.PI/2;
    scene.add(orbitRing);
    
    // Спутники
    pData.moons.forEach(mData => {
        const moonDist = mData.dist / SCALE;
        const moonRadius = Math.max(0.03, mData.radius / SCALE * 3);
        const moonTex = textures[mData.tex];
        const moonGeo = new THREE.SphereGeometry(moonRadius, 8, 8);
        const moonMat = moonTex
            ? new THREE.MeshStandardMaterial({map:moonTex, roughness:0.9})
            : new THREE.MeshStandardMaterial({color:0xaaaaaa, roughness:0.9});
        const moonMesh = new THREE.Mesh(moonGeo, moonMat);
        moonMesh.userData = {
            name: mData.name,
            orbit: moonDist,
            period: mData.period,
            angle: Math.random() * Math.PI * 2,
            desc: `${mData.name} (спутник ${pData.name})\nРасстояние: ${(mData.dist/1000).toFixed(0)} км\nРадиус: ${mData.radius} км\nПериод: ${mData.period} дней`,
            isMoon: true,
            parent: mesh
        };
        group.add(moonMesh);
        planetMeshes.push(moonMesh);
    });
    
    scene.add(group);
    planetMeshes.push(mesh);
    return {group, mesh, dist};
}

planetData.forEach(p => createPlanet(p));

// Китайские аппараты
const chineseCraft = [];
function addChineseCraft(name, color, desc) {
    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 8, 8),
        new THREE.MeshBasicMaterial({color})
    );
    mesh.userData = { name, desc, isChinese: true };
    scene.add(mesh);
    chineseCraft.push(mesh);
}

addChineseCraft('Тяньгун', 0xff0000, 'Орбитальная станция КНР\nОрбита: 390×390 км\nЭкипаж: 6 чел.\nЗапуск: 2021');
addChineseCraft('CEOS-01', 0x00ff00, 'Спутник наблюдения CEOS\nОрбита: 500×500 км (ССО)\nЗапуск: 07.07.2026');
addChineseCraft('CEOS-02', 0x00ff00, 'Спутник наблюдения CEOS\nОрбита: 500×500 км (ССО)\nЗапуск: 07.07.2026');
addChineseCraft('Цюэцяо-3', 0xffff00, 'Ретранслятор\nТочка L2 системы Земля-Луна\nЗапуск: 25.07.2026');
addChineseCraft('Чанъэ-8', 0xff8800, 'Лунная миссия\nЮжный полюс Луны\nЗапуск: 27.09.2026');

// Время
const J2000 = Date.UTC(2000,0,1,12,0,0);
const msPerDay = 86400000;
function getDay() { return (Date.now() - J2000) / msPerDay; }

// Клик
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
container.addEventListener('click', (e) => {
    mouse.x = (e.clientX / container.clientWidth) * 2 - 1;
    mouse.y = -(e.clientY / container.clientHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(planetMeshes.concat(chineseCraft).concat([sun]));
    if (intersects.length > 0) {
        const obj = intersects[0].object;
        const popup = document.getElementById('info-popup');
        document.getElementById('info-content').innerHTML = 
            `<h3>${obj.userData.name || 'Солнце'}</h3>
            <p style="white-space:pre-line">${obj.userData.desc || 'Звезда спектрального класса G2V. Температура поверхности: 5778 K.'}</p>`;
        popup.style.display = 'block';
    }
});

// Подписи (2D)
function updateLabels() {
    const container2d = document.getElementById('labels-container');
    container2d.innerHTML = '';
    
    const allObjects = [...planetMeshes, ...chineseCraft, sun];
    
    allObjects.forEach(mesh => {
        if (!mesh.userData.name) return;
        const pos = mesh.position.clone();
        if (mesh.userData.isMoon && mesh.userData.parent) {
            pos.add(mesh.userData.parent.position);
        }
        pos.project(camera);
        
        const x = (pos.x * 0.5 + 0.5) * container.clientWidth;
        const y = (-pos.y * 0.5 + 0.5) * container.clientHeight;
        
        if (pos.z > 1) return; // за камерой
        
        const div = document.createElement('div');
        div.className = 'label-2d';
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.textContent = mesh.userData.name;
        if (mesh.userData.isChinese) div.style.color = '#ff4444';
        if (mesh === sun) div.style.color = '#ffcc00';
        container2d.appendChild(div);
    });
}

// Рендер
function animate() {
    requestAnimationFrame(animate);
    
    const day = getDay();
    
    planetMeshes.forEach(mesh => {
        const ud = mesh.userData;
        if (!ud.period) return;
        const angle = (day / ud.period) * Math.PI * 2 + (ud.angle || 0);
        const dist = ud.orbit;
        
        if (ud.isMoon && ud.parent) {
            const parentPos = ud.parent.position;
            mesh.position.set(
                parentPos.x + Math.cos(angle) * dist,
                parentPos.y,
                parentPos.z + Math.sin(angle) * dist
            );
        } else if (!ud.isMoon) {
            mesh.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
        }
        mesh.rotation.y += 0.003;
    });
    
    // Китайские аппараты (упрощённо — вокруг Земли)
    const earthMesh = planetMeshes.find(m => m.userData.name === 'Земля');
    if (earthMesh) {
        chineseCraft.forEach((craft, i) => {
            const a = (day / (0.065 + i*0.001)) * Math.PI * 2;
            const r = 0.8 + i * 0.15;
            craft.position.set(
                earthMesh.position.x + Math.cos(a)*r,
                earthMesh.position.y + Math.sin(a*0.5)*0.2,
                earthMesh.position.z + Math.sin(a)*r
            );
        });
    }
    
    controls.update();
    updateLabels();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
