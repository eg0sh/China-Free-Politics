<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта системы — China Space Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; overflow: hidden; }
        #container { width: 100%; height: 100%; }
        .topbar {
            position: absolute;
            top: 0; left: 0; right: 0;
            background: rgba(8,8,22,0.9);
            padding: 10px 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a3a;
        }
        .topbar a { color: #ccc; text-decoration: none; font-weight: bold; font-size: 14px; }
        .topbar .brand { color: #cc0000; }
        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(8,8,22,0.95);
            border: 1px solid #1a1a3a;
            border-radius: 8px;
            padding: 15px;
            color: #e0e0e0;
            max-width: 300px;
            display: none;
            z-index: 10;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .info-panel h3 { color: #ffcc00; margin-bottom: 8px; }
        .info-panel p { margin: 3px 0; color: #aaa; }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(8,8,22,0.9);
            border: 1px solid #1a1a3a;
            border-radius: 8px;
            padding: 12px;
            color: #888;
            font-size: 11px;
            z-index: 10;
            font-family: 'Courier New', monospace;
        }
        .legend span { display: block; margin: 2px 0; }
        .legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    </style>
</head>
<body>
<div id="container"></div>
<div class="topbar">
    <span class="brand">🌌 КАРТА СИСТЕМЫ</span>
    <a href="../index.html">← На главную</a>
</div>
<div class="info-panel" id="info-panel"></div>
<div class="legend">
    <span><span class="dot" style="background:#ff4444;"></span> Аппараты КНР</span>
    <span><span class="dot" style="background:#ffcc00;"></span> Орбитальные станции</span>
    <span><span class="dot" style="background:#00aaff;"></span> Лунные миссии</span>
    <span><span class="dot" style="background:#ff8800;"></span> Марсианские миссии</span>
    <span>Масштаб: 1:1 000 000 (1 ед = 1000 км)</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 1, 1000000);
camera.position.set(0, 500, 1200);

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 50;
controls.maxDistance = 600000; // за Плутоном
controls.target.set(0, 0, 0);
controls.update();

// Звёзды
const starsGeo = new THREE.BufferGeometry();
const starsVerts = [];
for (let i = 0; i < 10000; i++) {
    const r = 100000 + Math.random() * 400000;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    starsVerts.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVerts, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff, size:20})));

// Солнце
const sunGeo = new THREE.SphereGeometry(200, 64, 64);
const sun = new THREE.Mesh(sunGeo, new THREE.MeshBasicMaterial({color:0xffdd44}));
scene.add(sun);

// Освещение
const sunLight = new THREE.DirectionalLight(0xffffff, 2);
sunLight.position.set(0, 0, 0);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x111133, 0.4));

// Планеты (масштаб 1:1000 км)
const planets = [
    { name: 'Меркурий', dist: 57910, r: 24.4, color: 0xaaaaaa },
    { name: 'Венера', dist: 108200, r: 60.5, color: 0xccaa44 },
    { name: 'Земля', dist: 149600, r: 63.7, color: 0x4488ff, texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg' },
    { name: 'Марс', dist: 227940, r: 33.9, color: 0xcc4400 },
    { name: 'Юпитер', dist: 778570, r: 699, color: 0xddaa77 },
    { name: 'Сатурн', dist: 1433500, r: 582, color: 0xddcc88 },
    { name: 'Уран', dist: 2872500, r: 254, color: 0x88ccdd },
    { name: 'Нептун', dist: 4495100, r: 246, color: 0x2244cc },
    { name: 'Плутон', dist: 5906400, r: 12, color: 0x886644 }
];

const planetMeshes = [];
planets.forEach(p => {
    let mat;
    if (p.texture) {
        const tex = new THREE.TextureLoader().load(p.texture);
        mat = new THREE.MeshPhongMaterial({map: tex});
    } else {
        mat = new THREE.MeshPhongMaterial({color: p.color});
    }
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.r, 32, 32), mat);
    mesh.position.set(p.dist, 0, 0);
    mesh.userData = { name: p.name, type: 'Планета' };
    scene.add(mesh);
    planetMeshes.push(mesh);
    
    // Орбитальное кольцо
    const ringGeo = new THREE.TorusGeometry(p.dist, 5, 8, 128);
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({color: 0x222244, transparent: true, opacity: 0.3}));
    ring.rotation.x = Math.PI/2;
    scene.add(ring);
});

// Китайские аппараты
const chineseAssets = [
    { name: 'Тяньгун', orbit: 6771, incl: 41.5, color: 0xffcc00, type: 'Орбитальная станция', launch: '2021' },
    { name: 'CEOS-01', orbit: 6871, incl: 97.4, color: 0xff4444, type: 'Спутник CEOS', launch: '07.07.2026' },
    { name: 'Цюэцяо-3', body: 'moon', color: 0x00aaff, type: 'Ретранслятор Луны', launch: '25.07.2026' },
    { name: 'Чанъэ-8', body: 'moon', color: 0x00aaff, type: 'Посадочный модуль', launch: '27.09.2026' }
];

const assetMarkers = [];
chineseAssets.forEach(a => {
    const marker = new THREE.Mesh(new THREE.SphereGeometry(15, 8, 8), new THREE.MeshBasicMaterial({color: a.color}));
    if (a.body === 'moon') {
        marker.position.copy(moonMesh.position).add(new THREE.Vector3(20, 0, 0));
    } else {
        marker.position.set(a.orbit, 0, 0);
    }
    marker.userData = a;
    scene.add(marker);
    assetMarkers.push(marker);
});

const moonMesh = planetMeshes.find(p => p.userData.name === 'Земля') ? 
    (() => {
        const mGeo = new THREE.SphereGeometry(17.37, 32, 32);
        const mMesh = new THREE.Mesh(mGeo, new THREE.MeshPhongMaterial({color: 0xcccccc}));
        mMesh.position.set(149600 + 384, 0, 0);
        mMesh.userData = { name: 'Луна', type: 'Спутник' };
        scene.add(mMesh);
        return mMesh;
    })() : null;

// Клики
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / container.clientWidth) * 2 - 1;
    mouse.y = -(e.clientY / container.clientHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects([...planetMeshes, ...assetMarkers, moonMesh].filter(Boolean));
    const panel = document.getElementById('info-panel');
    if (intersects.length > 0 && intersects[0].object.userData) {
        const d = intersects[0].object.userData;
        panel.style.display = 'block';
        panel.innerHTML = `<h3>${d.name}</h3><p>Тип: ${d.type || '—'}</p><p>Запуск: ${d.launch || '—'}</p><p>Орбита: ${d.orbit ? d.orbit + ' км' : '—'}</p>`;
    } else {
        panel.style.display = 'none';
    }
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
