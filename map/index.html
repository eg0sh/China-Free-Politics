<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта системы — China Space Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; overflow: hidden; }
        #viewport { width: 100%; height: 100%; }
        .topbar {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(8,8,22,0.9); border-bottom: 1px solid #1a1a3a;
            padding: 10px 20px; display: flex; justify-content: space-between;
            align-items: center; color: #ccc; z-index: 10; font-family: 'Segoe UI', sans-serif;
        }
        .topbar a { color: #cc0000; text-decoration: none; font-weight: bold; }
        .info-popup {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(17,17,34,0.95); border: 1px solid #cc0000;
            padding: 20px; border-radius: 10px; color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif; max-width: 350px; display: none; z-index: 10;
        }
        .info-popup h3 { color: #fff; margin-bottom: 10px; }
        .info-popup p { margin: 5px 0; font-size: 14px; }
        .info-popup .close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #888; font-size: 18px; }
    </style>
</head>
<body>

<div class="topbar">
    <span>🌌 Карта системы — China Space Live</span>
    <a href="index.html">← На главную</a>
</div>

<div id="viewport"></div>
<div class="info-popup" id="info-popup">
    <span class="close" onclick="document.getElementById('info-popup').style.display='none'">✕</span>
    <div id="info-content"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 300000);
camera.position.set(0, 300, 500);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.maxDistance = 80000; // за Плутоном (~59000)

// Звёзды
const starsGeo = new THREE.BufferGeometry();
const v = [];
for (let i=0;i<8000;i++) { const r=50000+Math.random()*30000,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1); v.push(r*Math.sin(ph)*Math.cos(th),r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph)); }
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(v,3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff,size:3})));

// Солнце
const sunTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/sun.jpg');
const sun = new THREE.Mesh(new THREE.SphereGeometry(10,32,32), new THREE.MeshBasicMaterial({map:sunTex}));
scene.add(sun);
const sunLight = new THREE.PointLight(0xffffff,2,0,0);
sun.add(sunLight);

// Планеты (данные: радиус орбиты в масштабе, размер планеты, цвет, период в днях)
const planets = [
    { name:'Меркурий', orbit:30, size:0.4, color:0xaaaaaa, period:88 },
    { name:'Венера', orbit:55, size:1, color:0xffcc88, period:225 },
    { name:'Земля', orbit:78, size:1.1, color:0x4488ff, period:365 },
    { name:'Марс', orbit:100, size:0.6, color:0xff4422, period:687 },
    { name:'Юпитер', orbit:180, size:5, color:0xffcc88, period:4333 },
    { name:'Сатурн', orbit:260, size:4, color:0xffdd88, period:10759 },
    { name:'Уран', orbit:340, size:2.5, color:0x88ccff, period:30687 },
    { name:'Нептун', orbit:400, size:2.3, color:0x4466ff, period:60190 },
    { name:'Плутон', orbit:460, size:0.3, color:0xccbbaa, period:90560 }
];

const planetMeshes = [];

planets.forEach(p => {
    const geo = new THREE.SphereGeometry(p.size, 16, 16);
    const mat = new THREE.MeshPhongMaterial({ color: p.color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = { name:p.name, orbit:p.orbit, period:p.period, angle:Math.random()*Math.PI*2 };
    scene.add(mesh);
    planetMeshes.push(mesh);
    
    // Орбитальное кольцо
    const ringGeo = new THREE.TorusGeometry(p.orbit, 0.1, 16, 128);
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color:0x333355, transparent:true, opacity:0.3 }));
    ring.rotation.x = Math.PI/2;
    scene.add(ring);
});

// Китайские аппараты (пример)
const spacecraft = [
    { name:'Тяньгун', orbitRadius:78.5, color:0xff0000, angle:0, period:0.064, desc:'Орбитальная станция. 390×390 км. Экипаж 6 чел.' },
    { name:'CEOS-01', orbitRadius:78.6, color:0x00ff00, angle:0.5, period:0.065, desc:'Спутник наблюдения. 500×500 км. ССО.' },
    { name:'Цюэцяо-3', body:'moon', color:0xffff00, desc:'Ретранслятор. Точка L2 Луны.' }
];

const spacecraftMeshes = [];
spacecraft.forEach(sc => {
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8), new THREE.MeshBasicMaterial({color:sc.color}));
    mesh.userData = sc;
    scene.add(mesh);
    spacecraftMeshes.push(mesh);
});

// Луна
const moon = new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8), new THREE.MeshPhongMaterial({color:0xcccccc}));
moon.userData = { name:'Луна', parent:'earth', orbit:2.5, period:27.3, angle:0 };
scene.add(moon);

// Время
const J2000 = Date.UTC(2000,0,1,12,0,0);
const msPerDay = 86400000;

function getDaySinceJ2000() {
    return (Date.now() - J2000) / msPerDay;
}

// Клик
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
container.addEventListener('click', (e) => {
    mouse.x = (e.clientX / container.clientWidth)*2-1;
    mouse.y = -(e.clientY / container.clientHeight)*2+1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects([...planetMeshes, ...spacecraftMeshes, moon, sun]);
    if (intersects.length > 0) {
        const obj = intersects[0].object;
        const popup = document.getElementById('info-popup');
        const content = document.getElementById('info-content');
        content.innerHTML = `<h3>${obj.userData.name || 'Объект'}</h3>
            <p>${obj.userData.desc || 'Планета Солнечной системы'}</p>
            <p>Период обращения: ${obj.userData.period ? obj.userData.period+' дней' : 'Н/Д'}</p>`;
        popup.style.display = 'block';
    }
});

function animate() {
    requestAnimationFrame(animate);
    
    const day = getDaySinceJ2000();
    
    // Обновление планет
    planetMeshes.forEach(mesh => {
        const p = mesh.userData;
        const angle = (day / p.period) * Math.PI * 2;
        mesh.position.x = Math.cos(angle) * p.orbit;
        mesh.position.z = Math.sin(angle) * p.orbit;
        mesh.rotation.y += 0.001;
    });
    
    // Луна вокруг Земли
    const earthMesh = planetMeshes[2];
    const moonAngle = (day / 27.3) * Math.PI * 2;
    moon.position.set(
        earthMesh.position.x + Math.cos(moonAngle)*2.5,
        0,
        earthMesh.position.z + Math.sin(moonAngle)*2.5
    );
    
    // Китайские аппараты (упрощённо)
    spacecraftMeshes.forEach(mesh => {
        const sc = mesh.userData;
        if (sc.body === 'moon') {
            mesh.position.copy(moon.position).add(new THREE.Vector3(0.5,0.5,0));
        } else {
            const a = (day / sc.period) * Math.PI * 2;
            mesh.position.set(Math.cos(a)*sc.orbitRadius, 0, Math.sin(a)*sc.orbitRadius);
        }
    });
    
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth/container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
