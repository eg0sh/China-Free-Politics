<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск — China Space Live</title>
    <style>
        :root {
            --bg: #0a0a12; --surface: #111122; --border: #1a1a3a;
            --red: #cc0000; --gold: #ffcc00; --text: #e0e0e0; --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: var(--text);
            font-family: 'Segoe UI', 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        #viewport { flex: 1; position: relative; cursor: grab; }
        #viewport:active { cursor: grabbing; }
        #viewport canvas { display: block; }
        #panel {
            width: 420px;
            background: var(--bg);
            border-left: 2px solid var(--red);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }
        #panel .header {
            background: var(--surface);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        #panel .header h2 { color: #fff; font-size: 18px; margin-bottom: 5px; }
        #panel .header .rocket-tag {
            display: inline-block;
            background: var(--red);
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .timer-big {
            font-size: clamp(28px,4vw,42px);
            font-weight: bold;
            color: var(--gold);
            text-align: center;
            padding: 15px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .current-event {
            margin: 10px 15px;
            padding: 15px;
            background: var(--surface);
            border-left: 4px solid var(--gold);
            border-radius: 0 8px 8px 0;
            font-size: 15px;
            line-height: 1.5;
            min-height: 60px;
        }
        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 15px;
            margin: 10px 0;
        }
        .telem-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .telem-card .val {
            font-size: 22px;
            font-weight: bold;
            color: var(--gold);
            font-family: 'Courier New', monospace;
        }
        .telem-card .lbl {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .objects-section {
            padding: 0 15px;
            margin: 10px 0;
        }
        .objects-section h3 {
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .object-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #0a0a18;
            font-size: 13px;
        }
        .object-row .name { color: #ccc; }
        .object-row .status {
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-active { background: #004400; color: #00ff00; }
        .status-separated { background: #444400; color: #ffcc00; }
        .status-burning { background: #440000; color: #ff4444; }
        .status-splash { background: #004466; color: #00aaff; }
        .status-orbiting { background: #440044; color: #ff00ff; }
        .status-waiting { background: #222244; color: #8888cc; }
        .btn-row { display: flex; gap: 10px; padding: 15px; }
        .btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-map { background: var(--red); color: #fff; }
        .btn-back { background: transparent; color: var(--muted); border: 1px solid #333; }
        @media (max-width: 900px) {
            body { flex-direction: column; }
            #viewport { height: 50vh; }
            #panel { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body>
<div id="viewport"></div>
<div id="panel">
    <div class="header">
        <span class="rocket-tag" id="rocket-badge">CZ-5B</span>
        <h2 id="mission-title">Загрузка...</h2>
    </div>
    <div class="timer-big" id="timer">T-00:00:00:00</div>
    <div class="current-event" id="event-text">Загрузка...</div>
    <div class="telemetry-grid">
        <div class="telem-card"><div class="val" id="alt">0</div><div class="lbl">Высота (км)</div></div>
        <div class="telem-card"><div class="val" id="vel">0</div><div class="lbl">Скорость (км/с)</div></div>
        <div class="telem-card"><div class="val" id="acc">0</div><div class="lbl">Ускорение (g)</div></div>
        <div class="telem-card"><div class="val" id="dist">0</div><div class="lbl">Пройдено (км)</div></div>
        <div class="telem-card"><div class="val" id="stage-name">—</div><div class="lbl">Этап</div></div>
        <div class="telem-card"><div class="val" id="downrange">0</div><div class="lbl">Дальность (км)</div></div>
    </div>
    <div class="objects-section">
        <h3>📦 Компоненты</h3>
        <div id="objects-list"></div>
    </div>
    <div class="btn-row">
        <a href="map/" class="btn btn-map">🌌 Карта системы</a>
        <a href="index.html" class="btn btn-back">← На главную</a>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 500000);
camera.position.set(0, 200, 400);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 600000; // за Плутоном
controls.target.set(0, 0, 0);
controls.update();

// Звёзды
const starsGeo = new THREE.BufferGeometry();
const starsVerts = [];
for (let i = 0; i < 5000; i++) {
    const r = 50000 + Math.random() * 200000;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    starsVerts.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVerts, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff, size:5})));

// Солнце
const sunGeo = new THREE.SphereGeometry(100, 32, 32);
const sunMat = new THREE.MeshBasicMaterial({color: 0xffdd44});
const sun = new THREE.Mesh(sunGeo, sunMat);
sun.position.set(0, 0, -15000000);
scene.add(sun);

// Земля
const earthTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
const earthGeo = new THREE.SphereGeometry(63.71, 64, 64);
const earthMesh = new THREE.Mesh(earthGeo, new THREE.MeshPhongMaterial({map: earthTex}));
scene.add(earthMesh);

// Луна
const moonGeo = new THREE.SphereGeometry(17.37, 32, 32);
const moonMesh = new THREE.Mesh(moonGeo, new THREE.MeshPhongMaterial({color: 0xcccccc}));
moonMesh.position.set(3844, 0, 0); // 384 400 км → 3844 в масштабе 1:100
scene.add(moonMesh);

// Освещение
const sunLight = new THREE.DirectionalLight(0xffffff, 2);
sunLight.position.copy(sun.position);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x222244, 0.6));

// Космодром Вэньчан
function latLonToVec3(lat, lon, r) {
    const phi = (90-lat)*Math.PI/180;
    const theta = lon*Math.PI/180;
    return new THREE.Vector3(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
const wenchangPos = latLonToVec3(19.6, 110.9, 63.81);
const padMarker = new THREE.Mesh(
    new THREE.SphereGeometry(1, 8, 8),
    new THREE.MeshBasicMaterial({color: 0xffcc00})
);
padMarker.position.copy(wenchangPos);
scene.add(padMarker);

// Ракета
const rocketGroup = new THREE.Group();
scene.add(rocketGroup);
rocketGroup.position.copy(wenchangPos);

// Траектория
const trajPoints = [];
const trajLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({color:0xffcc00, transparent:true, opacity:0.5}));
scene.add(trajLine);

// ========== ДАННЫЕ ==========
const params = new URLSearchParams(window.location.search);
const launchId = params.get('id') || 'ceos-1';

fetch('../data/launches.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const launch = data.launches.find(l => l.id === launchId) || data.launches[0];
    document.getElementById('mission-title').textContent = launch.name;
    document.getElementById('rocket-badge').textContent = launch.rocket;
    
    const startTime = new Date(launch.start_time).getTime();
    const events = launch.events;
    let elapsed = -Infinity;
    
    function update() {
        const now = Date.now();
        elapsed = (now - startTime) / 1000;
        
        const abs = Math.abs(elapsed);
        const d = Math.floor(abs/86400);
        const h = Math.floor((abs%86400)/3600);
        const mn = Math.floor((abs%3600)/60);
        const s = Math.floor(abs%60);
        const sign = elapsed < 0 ? 'T-' : 'T+';
        document.getElementById('timer').textContent = `${sign}${d}:${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        
        if (elapsed < 0) {
            document.getElementById('event-text').textContent = 'ГОТОВИТСЯ. Обратный отсчёт до старта.';
            document.getElementById('stage-name').textContent = 'Подготовка';
            document.getElementById('alt').textContent = '0';
            document.getElementById('vel').textContent = '0';
            document.getElementById('objects-list').innerHTML = '<div class="object-row"><span class="name">🔵 Центральный блок</span><span class="status status-waiting">Ожидание</span></div><div class="object-row"><span class="name">🟡 Ускорители (4)</span><span class="status status-waiting">Ожидание</span></div><div class="object-row"><span class="name">⚪ Обтекатель</span><span class="status status-waiting">Установлен</span></div><div class="object-row"><span class="name">🛰️ 12 спутников CEOS</span><span class="status status-waiting">Ожидание</span></div>';
            return;
        }
        
        let cur = events[0];
        let nxt = events[1];
        for (let i = 0; i < events.length; i++) {
            if (events[i].t <= elapsed) { cur = events[i]; nxt = events[i+1] || events[i]; }
        }
        
        document.getElementById('event-text').textContent = cur.text;
        document.getElementById('stage-name').textContent = cur.stage;
        
        let alt = cur.alt, vel = cur.vel;
        if (cur !== nxt && elapsed > cur.t && elapsed < nxt.t) {
            const p = (elapsed - cur.t) / (nxt.t - cur.t);
            alt = cur.alt + (nxt.alt - cur.alt) * p;
            vel = cur.vel + (nxt.vel - cur.vel) * p;
        }
        
        document.getElementById('alt').textContent = alt.toFixed(1);
        document.getElementById('vel').textContent = vel.toFixed(2);
        document.getElementById('acc').textContent = (alt < 50 ? (1 + Math.random()*0.3).toFixed(1) : (vel < 1 ? '1.5' : '0'));
        document.getElementById('dist').textContent = (alt * 1.5).toFixed(0);
        document.getElementById('downrange').textContent = (alt * 0.8).toFixed(0);
        
        // Позиция ракеты
        if (elapsed > 0 && elapsed < 600) {
            const totalAlt = alt * 100;
            const dir = new THREE.Vector3(0, 1, 0.3).normalize();
            const pos = wenchangPos.clone().add(dir.clone().multiplyScalar(totalAlt));
            rocketGroup.position.copy(pos);
            rocketGroup.lookAt(new THREE.Vector3(0,0,0));
        }
        if (elapsed > 540) {
            rocketGroup.position.set(0, 10000, 0);
            rocketGroup.visible = false;
        }
        
        // Траектория
        if (elapsed > 0 && elapsed < 600) {
            trajPoints.push(rocketGroup.position.clone());
            if (trajPoints.length > 1000) trajPoints.shift();
            const geo = new THREE.BufferGeometry().setFromPoints(trajPoints);
            trajLine.geometry.dispose();
            trajLine.geometry = geo;
        }
        
        // Камера
        if (elapsed < 600) {
            const target = rocketGroup.position.clone();
            controls.target.lerp(target, 0.02);
            const cp = target.clone().add(new THREE.Vector3(50, 30, 80));
            camera.position.lerp(cp, 0.02);
        }
        
        // Компоненты
        let objHtml = '';
        const coreAlive = elapsed < 510;
        objHtml += `<div class="object-row"><span class="name">🔵 Центральный блок</span><span class="status ${coreAlive ? 'status-active' : (elapsed < 540 ? 'status-separated' : 'status-burning')}">${coreAlive ? 'Активен' : (elapsed < 540 ? 'Выключен' : 'Сгорел')}</span></div>`;
        
        for (let i = 0; i < 4; i++) {
            const sep = elapsed >= 165;
            const splashed = elapsed >= 300;
            objHtml += `<div class="object-row"><span class="name">🟡 Ускоритель ${i+1}</span><span class="status ${sep ? (splashed ? 'status-splash' : 'status-burning') : 'status-active'}">${sep ? (splashed ? 'Приводнился' : 'Падает') : 'Активен'}</span></div>`;
        }
        
        const fairSep = elapsed >= 260;
        objHtml += `<div class="object-row"><span class="name">⚪ Обтекатель</span><span class="status ${fairSep ? 'status-splash' : 'status-active'}">${fairSep ? 'Сброшен' : 'Установлен'}</span></div>`;
        
        const usSep = elapsed >= 540;
        objHtml += `<div class="object-row"><span class="name">🟣 Блок выведения</span><span class="status ${usSep ? (elapsed < 6480 ? 'status-orbiting' : 'status-burning') : 'status-active'}">${usSep ? (elapsed < 6480 ? 'На орбите' : 'Сошел') : 'Пристыкован'}</span></div>`;
        
        const satsSep = elapsed >= 5400;
        const satsDone = elapsed >= 6480;
        objHtml += `<div class="object-row"><span class="name">🛰️ 12 спутников CEOS</span><span class="status ${satsSep ? (satsDone ? 'status-orbiting' : 'status-active') : 'status-waiting'}">${satsSep ? (satsDone ? 'На орбите' : 'Отделяются') : 'Ожидание'}</span></div>`;
        
        document.getElementById('objects-list').innerHTML = objHtml;
    }
    
    setInterval(update, 250);
    update();
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
