<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск — China Space Live</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { display: flex; height: 100vh; overflow: hidden; }
    </style>
</head>
<body>

<div id="viewport"></div>

<div id="panel">
    <div class="header">
        <span class="rocket-tag" id="rocket-badge">CZ-5B</span>
        <h2 id="mission-title">Загрузка...</h2>
        <p style="font-size:12px;color:var(--muted);margin-top:4px;" id="mission-date"></p>
    </div>
    <div class="timer-big" id="timer">--:--:--:--</div>
    <div class="current-event" id="event-text">Загрузка...</div>
    <div class="telemetry-grid">
        <div class="telem-card"><div class="val" id="alt">0</div><div class="lbl">Высота (км)</div></div>
        <div class="telem-card"><div class="val" id="vel">0</div><div class="lbl">Скорость (км/с)</div></div>
        <div class="telem-card"><div class="val" id="acc">0</div><div class="lbl">Ускорение (g)</div></div>
        <div class="telem-card"><div class="val" id="dist">0</div><div class="lbl">Пройдено (км)</div></div>
        <div class="telem-card"><div class="val" id="stage-name">—</div><div class="lbl">Этап</div></div>
        <div class="telem-card"><div class="val" id="downrange">0</div><div class="lbl">Дальность (км)</div></div>
    </div>
    <div class="objects-section">
        <h3>📦 Компоненты</h3>
        <div id="objects-list"></div>
    </div>
    <div class="btn-row">
        <a href="map.html" class="btn btn-map">🌌 Карта системы</a>
        <a href="index.html" class="btn btn-back">← На главную</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ========== СЦЕНА ==========
const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 200000);
camera.position.set(0, 80, 200);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 15000;
controls.target.set(0, 0, 0);

// Звёзды
const starsGeo = new THREE.BufferGeometry();
const starsVerts = [];
for (let i = 0; i < 5000; i++) {
    const r = 12000 + Math.random() * 3000;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    starsVerts.push(r * Math.sin(ph) * Math.cos(th), r * Math.sin(ph) * Math.sin(th), r * Math.cos(ph));
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsVerts), 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 2 })));

// Освещение
scene.add(new THREE.DirectionalLight(0xffffff, 1.5));
scene.add(new THREE.AmbientLight(0x222244, 0.6));

// Земля (радиус = 63.71 единиц, 1 ед = 100 км, итого 6371 км)
const earthTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
const earth = new THREE.Mesh(
    new THREE.SphereGeometry(63.71, 64, 64),
    new THREE.MeshPhongMaterial({ map: earthTex, specular: 0x222222, shininess: 10 })
);
scene.add(earth);

// Атмосфера
scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(64.5, 64, 64),
    new THREE.MeshPhongMaterial({ color: 0x4488ff, transparent: true, opacity: 0.15 })
));

// Космодром Вэньчан (19.6°N, 110.9°E)
function latLonToVec3(lat, lon, radius) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = lon * Math.PI / 180;
    return new THREE.Vector3(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
    );
}
const wenchangPos = latLonToVec3(19.6, 110.9, 63.81);

const padGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 8);
const padMat = new THREE.MeshPhongMaterial({ color: 0xffcc00, emissive: 0x332200 });
const pad = new THREE.Mesh(padGeo, padMat);
pad.position.copy(wenchangPos);
pad.lookAt(new THREE.Vector3(0,0,0));
pad.rotateX(Math.PI/2);
scene.add(pad);

// ========== РАКЕТА (реалистичный масштаб: высота ~57 м = 0.57 единиц) ==========
const rocketGroup = new THREE.Group();
rocketGroup.visible = false; // Скрыта до T-60
scene.add(rocketGroup);

// Масштаб ракеты: 1 единица = 100 м. Ракета ~57 м → 0.57 единиц
const rocketScale = 0.57 / 57; // примерно 0.01 — масштабируем всю ракету

// Центральный блок (высота 57 м → 0.57, диаметр 5 м → 0.05)
const coreGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.57, 12);
const core = new THREE.Mesh(coreGeo, new THREE.MeshPhongMaterial({ color: 0xffffff }));
core.position.y = 0.285;
rocketGroup.add(core);

// Боковые ускорители
const boosters = [];
for (let i = 0; i < 4; i++) {
    const bGeo = new THREE.CylinderGeometry(0.018, 0.018, 0.4, 8);
    const b = new THREE.Mesh(bGeo, new THREE.MeshPhongMaterial({ color: 0xdddddd }));
    b.position.y = 0.2;
    const group = new THREE.Group();
    group.add(b);
    const nozzle = new THREE.Mesh(new THREE.ConeGeometry(0.016, 0.06, 8), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    nozzle.position.y = -0.02;
    group.add(nozzle);
    const angle = i * Math.PI / 2 + Math.PI / 4;
    group.position.set(Math.cos(angle) * 0.04, 0.02, Math.sin(angle) * 0.04);
    group.userData = { separated: false, pos: new THREE.Vector3(), vel: new THREE.Vector3(), visible: true };
    rocketGroup.add(group);
    boosters.push(group);
}

// Верхняя ступень
const upperStageGeo = new THREE.CylinderGeometry(0.022, 0.022, 0.2, 12);
const upperStage = new THREE.Mesh(upperStageGeo, new THREE.MeshPhongMaterial({ color: 0xeeeeff }));
upperStage.position.y = 0.67;
upperStage.userData = { separated: false, pos: new THREE.Vector3(), vel: new THREE.Vector3(), visible: true };
rocketGroup.add(upperStage);

// Обтекатель
const fairingGeo = new THREE.ConeGeometry(0.026, 0.2, 12);
const fairing = new THREE.Mesh(fairingGeo, new THREE.MeshPhongMaterial({ color: 0xcccccc, transparent: true, opacity: 0.7 }));
fairing.position.y = 0.87;
fairing.userData = { separated: false, pos: new THREE.Vector3(), vel: new THREE.Vector3(), visible: true };
rocketGroup.add(fairing);

// Пламя
const flameGeo = new THREE.ConeGeometry(0.02, 0.3, 8);
const flame = new THREE.Mesh(flameGeo, new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.9 }));
flame.position.y = -0.15;
flame.rotation.x = Math.PI;
flame.visible = false;
rocketGroup.add(flame);

// Траектория
const trajectoryPoints = [];
const trajectoryLine = new THREE.Line(
    new THREE.BufferGeometry(),
    new THREE.LineBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.4 })
);
trajectoryLine.visible = false;
scene.add(trajectoryLine);

// ========== ДАННЫЕ ==========
const params = new URLSearchParams(window.location.search);
const launchId = params.get('id') || 'ceos-1';

let launchData = null;
let startTime = 0;
let events = [];

// Резервные данные на случай ошибки загрузки
const fallbackLaunch = {
    name: 'CEOS-1 · Первая партия «Небесный глаз»',
    rocket: 'CZ-5B',
    start_time: '2026-07-07T04:00:00+08:00',
    events: [
        { t: -14400, text: 'ГОТОВИТСЯ К ЗАПУСКУ. Ракета CZ-5B на стартовом столе №1 космодрома Вэньчан.', alt: 0, vel: 0, stage: 'Ожидание' },
        { t: -60, text: 'ЗАЖИГАНИЕ. Тяга 10 620 кН.', alt: 0, vel: 0, stage: 'Зажигание' },
        { t: 0, text: 'СТАРТ. Отрыв от стартового стола.', alt: 0, vel: 0, stage: 'Старт' },
        { t: 90, text: 'Max Q. Высота 18 км.', alt: 18, vel: 0.46, stage: 'Max Q' },
        { t: 165, text: 'Отделение ускорителей.', alt: 65, vel: 1.2, stage: 'Отделение' },
        { t: 260, text: 'Сброс обтекателя.', alt: 120, vel: 3.1, stage: 'Сброс обтекателя' },
        { t: 510, text: 'Выход на орбиту 200×200 км.', alt: 195, vel: 7.8, stage: 'Орбита' },
        { t: 540, text: 'Отделение блока выведения.', alt: 200, vel: 7.8, stage: 'Отделение ПН' },
        { t: 5400, text: 'Отделение спутников.', alt: 500, vel: 7.85, stage: 'Развёртывание' },
        { t: 10800, text: 'Миссия успешна.', alt: 500, vel: 7.85, stage: 'Успех' }
    ]
};

fetch('data/launches.json?' + Date.now())
    .then(r => r.json())
    .then(data => {
        launchData = data.launches.find(l => l.id === launchId) || data.launches[0] || fallbackLaunch;
        initLaunch(launchData);
    })
    .catch(() => {
        launchData = fallbackLaunch;
        initLaunch(launchData);
    });

function initLaunch(launch) {
    document.getElementById('mission-title').textContent = launch.name;
    document.getElementById('rocket-badge').textContent = launch.rocket;
    document.getElementById('mission-date').textContent = 
        new Date(launch.start_time).toLocaleString('ru-RU', {timeZone: 'Asia/Shanghai'}) + ' (UTC+8)';
    
    startTime = new Date(launch.start_time).getTime();
    events = launch.events;
    rocketGroup.position.copy(wenchangPos);
    
    update();
    setInterval(update, 250);
}

function update() {
    if (!launchData) return;
    
    const now = Date.now();
    const elapsed = (now - startTime) / 1000;
    
    // Таймер
    const abs = Math.abs(elapsed);
    const d = Math.floor(abs / 86400);
    const h = Math.floor((abs % 86400) / 3600);
    const m = Math.floor((abs % 3600) / 60);
    const s = Math.floor(abs % 60);
    const sign = elapsed < 0 ? 'T-' : 'T+';
    document.getElementById('timer').textContent = 
        `${sign}${d}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    
    // До T-60: ракета скрыта, Земля видна
    if (elapsed < -60) {
        rocketGroup.visible = false;
        trajectoryLine.visible = false;
        document.getElementById('event-text').textContent = 
            'ГОТОВИТСЯ К ЗАПУСКУ. Ракета CZ-5B на стартовом столе №1 космодрома Вэньчан. Предстартовые проверки.';
        document.getElementById('stage-name').textContent = 'Ожидание';
        ['alt','vel','acc','dist','downrange'].forEach(id => document.getElementById(id).textContent = '0');
        updateObjectsListPreLaunch();
        controls.target.set(0, 0, 0);
        camera.position.lerp(new THREE.Vector3(0, 80, 200), 0.02);
        return;
    }
    
    // T-60 и позже: ракета видна
    rocketGroup.visible = true;
    rocketGroup.position.copy(wenchangPos);
    
    // Находим событие
    let cur = events[0];
    let nxt = events[1] || events[0];
    for (let i = 0; i < events.length; i++) {
        if (events[i].t <= elapsed) { cur = events[i]; nxt = events[i + 1] || events[i]; }
    }
    
    document.getElementById('event-text').textContent = cur.text;
    document.getElementById('stage-name').textContent = cur.stage;
    
    let alt = cur.alt, vel = cur.vel;
    if (cur !== nxt && elapsed > cur.t && elapsed < nxt.t) {
        const p = (elapsed - cur.t) / (nxt.t - cur.t);
        alt = cur.alt + (nxt.alt - cur.alt) * p;
        vel = cur.vel + (nxt.vel - cur.vel) * p;
    }
    
    document.getElementById('alt').textContent = alt.toFixed(1);
    document.getElementById('vel').textContent = vel.toFixed(2);
    document.getElementById('acc').textContent = (vel < 1 ? (vel * 10 + 1).toFixed(1) : '1.0');
    document.getElementById('dist').textContent = (alt * 1.5).toFixed(0);
    document.getElementById('downrange').textContent = (alt * 0.8).toFixed(0);
    
    // Позиция ракеты (1 км = 0.01 единицы)
    if (elapsed > 0 && elapsed < 600) {
        const totalAlt = alt * 0.01;
        const dir = new THREE.Vector3(0, 1, 0.3).normalize();
        rocketGroup.position.copy(wenchangPos.clone().add(dir.clone().multiplyScalar(totalAlt)));
        rocketGroup.lookAt(new THREE.Vector3(0, 0, 0));
        
        trajectoryLine.visible = true;
        trajectoryPoints.push(rocketGroup.position.clone());
        if (trajectoryPoints.length > 500) trajectoryPoints.shift();
        trajectoryLine.geometry.dispose();
        trajectoryLine.geometry = new THREE.BufferGeometry().setFromPoints(trajectoryPoints);
        
        controls.target.lerp(rocketGroup.position, 0.05);
    }
    
    flame.visible = elapsed > -60 && elapsed < 510;
    
    // Отделения
    if (elapsed >= 165 && boosters[0] && !boosters[0].userData.separated) {
        boosters.forEach(b => { b.userData.separated = true; rocketGroup.remove(b); });
    }
    if (elapsed >= 260 && fairing && !fairing.userData.separated) {
        fairing.userData.separated = true; rocketGroup.remove(fairing);
    }
    if (elapsed >= 540 && upperStage && !upperStage.userData.separated) {
        upperStage.userData.separated = true; rocketGroup.remove(upperStage);
    }
    
    updateObjectsList(elapsed);
}

function updateObjectsListPreLaunch() {
    document.getElementById('objects-list').innerHTML = `
        <div class="object-row"><span class="name">🔵 Центральный блок</span><span class="status status-waiting">Ожидание</span></div>
        <div class="object-row"><span class="name">🟡 Ускорители (4)</span><span class="status status-waiting">Ожидание</span></div>
        <div class="object-row"><span class="name">⚪ Обтекатель</span><span class="status status-waiting">Ожидание</span></div>
        <div class="object-row"><span class="name">🟣 Блок выведения</span><span class="status status-waiting">Ожидание</span></div>
        <div class="object-row"><span class="name">🛰️ 12 спутников CEOS</span><span class="status status-waiting">Ожидание</span></div>`;
}

function updateObjectsList(elapsed) {
    let html = '';
    const cStat = elapsed > 540 ? (elapsed < 10800 ? 'status-orbiting' : 'status-separated') : 'status-active';
    html += `<div class="object-row"><span class="name">🔵 Центральный блок</span><span class="status ${cStat}">${elapsed > 540 ? 'На орбите' : 'Активен'}</span></div>`;
    
    boosters.forEach((b, i) => {
        html += `<div class="object-row"><span class="name">🟡 Ускоритель ${i + 1}</span><span class="status ${b.userData.separated ? 'status-splash' : 'status-active'}">${b.userData.separated ? 'Отделён' : 'Активен'}</span></div>`;
    });
    
    html += `<div class="object-row"><span class="name">⚪ Обтекатель</span><span class="status ${fairing.userData.separated ? 'status-splash' : 'status-active'}">${fairing.userData.separated ? 'Сброшен' : 'Активен'}</span></div>`;
    html += `<div class="object-row"><span class="name">🟣 Блок выведения</span><span class="status ${upperStage.userData.separated ? 'status-orbiting' : 'status-active'}">${upperStage.userData.separated ? 'На орбите' : 'Активен'}</span></div>`;
    html += `<div class="object-row"><span class="name">🛰️ 12 спутников CEOS</span><span class="status ${elapsed > 5400 ? 'status-orbiting' : 'status-waiting'}">${elapsed > 5400 ? 'На орбите' : 'Ожидание'}</span></div>`;
    
    document.getElementById('objects-list').innerHTML = html;
}

// Рендер
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
