<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск — China Space Live</title>
    <style>
        :root {
            --bg: #0a0a12; --surface: #111122; --border: #1a1a3a;
            --red: #cc0000; --gold: #ffcc00; --text: #e0e0e0; --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: var(--text);
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        #viewport { flex: 1; cursor: grab; }
        #viewport:active { cursor: grabbing; }
        #panel {
            width: 420px;
            background: var(--bg);
            border-left: 2px solid var(--red);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }
        #panel .header {
            background: var(--surface);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        #panel .header h2 { color: #fff; font-size: 17px; margin-bottom: 4px; }
        #panel .header .tag {
            display: inline-block;
            background: var(--red);
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
        }
        .timer-big {
            font-size: clamp(24px, 4vw, 42px);
            font-weight: bold;
            color: var(--gold);
            text-align: center;
            padding: 15px;
            word-break: break-all;
        }
        .current-event {
            margin: 10px 15px;
            padding: 15px;
            background: var(--surface);
            border-left: 4px solid var(--gold);
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            line-height: 1.5;
        }
        .telem-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 15px;
            margin: 10px 0;
        }
        .telem-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .telem-card .val { font-size: clamp(16px, 3vw, 22px); font-weight: bold; color: var(--gold); }
        .telem-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .objects-section { padding: 0 15px; margin: 10px 0; }
        .objects-section h3 {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .obj-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #0a0a18;
            font-size: 12px;
        }
        .obj-row .name { color: #ccc; }
        .obj-row .status { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .s-active { background: #004400; color: #00ff00; }
        .s-sep { background: #444400; color: #ffcc00; }
        .s-burn { background: #440000; color: #ff4444; }
        .s-splash { background: #004466; color: #00aaff; }
        .s-orbit { background: #440044; color: #ff00ff; }
        .btn-row { display: flex; gap: 10px; padding: 15px; }
        .btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-map { background: var(--red); color: #fff; }
        .btn-back { background: transparent; color: var(--muted); border: 1px solid #333; }
        @media (max-width: 900px) {
            body { flex-direction: column; }
            #viewport { height: 50vh; }
            #panel { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body>
<div id="viewport"></div>
<div id="panel">
    <div class="header">
        <span class="tag" id="rocket-badge">—</span>
        <h2 id="mission-title">Загрузка...</h2>
    </div>
    <div class="timer-big" id="timer">--:--:--:--</div>
    <div class="current-event" id="event-text">Загрузка...</div>
    <div class="telem-grid">
        <div class="telem-card"><div class="val" id="alt">0</div><div class="lbl">Высота (км)</div></div>
        <div class="telem-card"><div class="val" id="vel">0</div><div class="lbl">Скорость (км/с)</div></div>
        <div class="telem-card"><div class="val" id="acc">0</div><div class="lbl">Ускорение (g)</div></div>
        <div class="telem-card"><div class="val" id="dist">0</div><div class="lbl">Пройдено (км)</div></div>
        <div class="telem-card"><div class="val" id="stage-name">—</div><div class="lbl">Этап</div></div>
        <div class="telem-card"><div class="val" id="downrange">0</div><div class="lbl">Дальность (км)</div></div>
    </div>
    <div class="objects-section">
        <h3>📦 Компоненты</h3>
        <div id="objects-list"></div>
    </div>
    <div class="btn-row">
        <a href="map/" class="btn btn-map">🌌 Карта системы</a>
        <a href="index.html" class="btn btn-back">← На главную</a>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);
const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 50000);
camera.position.set(0, 100, 300);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 5;
controls.maxDistance = 50000;
controls.target.set(0, 50, 0);

// Звёзды
const starsGeo = new THREE.BufferGeometry();
const sv = [];
for (let i=0;i<3000;i++){ const r=10000; sv.push((Math.random()-0.5)*2*r,(Math.random()-0.5)*2*r,(Math.random()-0.5)*2*r); }
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff,size:2})));

scene.add(new THREE.DirectionalLight(0xffffff, 1.5).translateX(500).translateY(300).translateZ(200));
scene.add(new THREE.AmbientLight(0x222244, 0.6));

// Земля
const earthTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
const earth = new THREE.Mesh(new THREE.SphereGeometry(63.71,64,64), new THREE.MeshPhongMaterial({map:earthTex,specular:0x222222,shininess:10}));
scene.add(earth);
scene.add(new THREE.Mesh(new THREE.SphereGeometry(64.5,64,64), new THREE.MeshPhongMaterial({color:0x4488ff,transparent:true,opacity:0.15})));

const wenchangPos = new THREE.Vector3(
    63.81*Math.sin((90-19.6)*Math.PI/180)*Math.cos(110.9*Math.PI/180),
    63.81*Math.cos((90-19.6)*Math.PI/180),
    63.81*Math.sin((90-19.6)*Math.PI/180)*Math.sin(110.9*Math.PI/180)
);
const pad = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,1,8), new THREE.MeshPhongMaterial({color:0xffcc00,emissive:0x332200}));
pad.position.copy(wenchangPos);
pad.lookAt(new THREE.Vector3(0,0,0)); pad.rotateX(Math.PI/2);
scene.add(pad);

// Ракета
const rocketGroup = new THREE.Group();
rocketGroup.position.copy(wenchangPos);
scene.add(rocketGroup);
const core = new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,18,16), new THREE.MeshPhongMaterial({color:0xffffff}));
core.position.y=9; rocketGroup.add(core);
const flame = new THREE.Mesh(new THREE.ConeGeometry(0.6,8,8), new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.9}));
flame.position.y=-4; flame.rotation.x=Math.PI; rocketGroup.add(flame);
const boosters = [];
for (let i=0;i<4;i++){
    const b = new THREE.Group();
    b.add(new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.45,10,8), new THREE.MeshPhongMaterial({color:0xdddddd})).translateY(5));
    b.add(new THREE.Mesh(new THREE.ConeGeometry(0.4,1.5,8), new THREE.MeshPhongMaterial({color:0x333333})).translateY(-0.5));
    const a = i*Math.PI/2+Math.PI/4;
    b.position.set(Math.cos(a)*1.4,0.5,Math.sin(a)*1.4);
    b.userData={separated:false,pos:new THREE.Vector3(),vel:new THREE.Vector3()};
    rocketGroup.add(b); boosters.push(b);
}
const fairing = new THREE.Mesh(new THREE.ConeGeometry(0.75,5,16), new THREE.MeshPhongMaterial({color:0xcccccc,transparent:true,opacity:0.7}));
fairing.position.y=27; fairing.userData={separated:false,pos:new THREE.Vector3(),vel:new THREE.Vector3()};
rocketGroup.add(fairing);
const upperStage = new THREE.Group();
upperStage.add(new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.7,6,16), new THREE.MeshPhongMaterial({color:0xeeeeff})).translateY(3));
upperStage.position.y=21; upperStage.userData={separated:false,pos:new THREE.Vector3(),vel:new THREE.Vector3()};
rocketGroup.add(upperStage);
const separated = [];
const trajPts = [];
const trajLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({color:0xffcc00,transparent:true,opacity:0.4}));
scene.add(trajLine);

let launchData = null, startTime = 0;

fetch('../data/launches.json?'+Date.now())
  .then(r=>r.json())
  .then(data=>{
    launchData = data.launches.find(l=>l.id === (new URLSearchParams(window.location.search)).get('id')) || data.launches[0];
    document.getElementById('mission-title').textContent = launchData.name;
    document.getElementById('rocket-badge').textContent = launchData.rocket;
    startTime = new Date(launchData.start_time).getTime();
    document.getElementById('event-text').textContent = Date.now() < startTime ? 'Ожидание старта...' : 'Загрузка...';
  });

function update(){
    if (!launchData) return;
    const elapsed = (Date.now() - startTime) / 1000;
    const abs = Math.abs(elapsed);
    const d = Math.floor(abs/86400), h = Math.floor((abs%86400)/3600), m = Math.floor((abs%3600)/60), s = Math.floor(abs%60);
    const timerEl = document.getElementById('timer');
    timerEl.textContent = (elapsed<0?'T-':'T+')+`${d}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    
    if (elapsed < 0) {
        document.getElementById('event-text').textContent = 'Готовится к запуску';
        document.getElementById('stage-name').textContent = 'Ожидание';
        return;
    }
    
    const events = launchData.events;
    let cur=events[0], nxt=events[1];
    for (let i=0;i<events.length;i++){ if(events[i].t<=elapsed){ cur=events[i]; nxt=events[i+1]||events[i]; } }
    document.getElementById('event-text').textContent = cur.text;
    document.getElementById('stage-name').textContent = cur.stage;
    let alt=cur.alt, vel=cur.vel;
    if(cur!==nxt && elapsed>cur.t && elapsed<nxt.t){
        const p=(elapsed-cur.t)/(nxt.t-cur.t);
        alt=cur.alt+(nxt.alt-cur.alt)*p; vel=cur.vel+(nxt.vel-cur.vel)*p;
    }
    document.getElementById('alt').textContent=alt.toFixed(1);
    document.getElementById('vel').textContent=vel.toFixed(2);
    document.getElementById('acc').textContent=(vel<1?(vel*10+1).toFixed(1):'1.0');
    document.getElementById('dist').textContent=(alt*1.5).toFixed(0);
    document.getElementById('downrange').textContent=(alt*0.8).toFixed(0);
    
    if(elapsed>0){
        const dir=new THREE.Vector3(0,1,0.3).normalize();
        rocketGroup.position.copy(wenchangPos).add(dir.clone().multiplyScalar(alt*100));
        trajPts.push(rocketGroup.position.clone());
        if(trajPts.length>500)trajPts.shift();
        trajLine.geometry.dispose();
        trajLine.geometry=new THREE.BufferGeometry().setFromPoints(trajPts);
        flame.visible=elapsed<510;
    }
    
    if(elapsed>=165 && !boosters[0].userData.separated) boosters.forEach(b=>{
        b.userData.separated=true; b.userData.pos=b.position.clone().add(rocketGroup.position);
        b.userData.vel=new THREE.Vector3(Math.random()-0.5,-0.5,Math.random()-0.5).normalize().multiplyScalar(5);
        separated.push(b); rocketGroup.remove(b);
    });
    if(elapsed>=260 && !fairing.userData.separated){
        fairing.userData.separated=true; fairing.userData.pos=fairing.position.clone().add(rocketGroup.position);
        fairing.userData.vel=new THREE.Vector3(1,-0.3,0).normalize().multiplyScalar(3);
        separated.push(fairing); rocketGroup.remove(fairing);
    }
    if(elapsed>=540 && !upperStage.userData.separated){
        upperStage.userData.separated=true;
        upperStage.userData.pos=upperStage.position.clone().add(rocketGroup.position);
        upperStage.userData.vel=new THREE.Vector3();
        separated.push(upperStage);
    }
    separated.forEach(obj=>{
        if(obj.userData.vel){ obj.userData.pos.add(obj.userData.vel.clone().multiplyScalar(0.016)); obj.position.copy(obj.userData.pos); }
    });
    
    // Список компонентов
    const list = document.getElementById('objects-list');
    let html='';
    html+=`<div class="obj-row"><span class="name">🔵 Центральный блок</span><span class="status ${elapsed>540?'s-orbit':elapsed>510?'s-sep':'s-active'}">${elapsed>540?'На орбите':elapsed>510?'Выключен':'Активен'}</span></div>`;
    boosters.forEach((b,i)=>{
        html+=`<div class="obj-row"><span class="name">🟡 Ускоритель ${i+1}</span><span class="status ${b.userData.separated?'s-burn':'s-active'}">${b.userData.separated?'Падает':'Активен'}</span></div>`;
    });
    html+=`<div class="obj-row"><span class="name">⚪ Обтекатель</span><span class="status ${fairing.userData.separated?'s-burn':'s-active'}">${fairing.userData.separated?'Сброшен':'Установлен'}</span></div>`;
    html+=`<div class="obj-row"><span class="name">🟣 Блок выведения</span><span class="status ${upperStage.userData.separated?'s-orbit':'s-active'}">${upperStage.userData.separated?'На орбите':'Пристыкован'}</span></div>`;
    html+=`<div class="obj-row"><span class="name">🛰️ 12 спутников CEOS</span><span class="status ${elapsed>6480?'s-orbit':elapsed>5400?'s-active':'s-active'}">${elapsed>6480?'На орбите':elapsed>5400?'Отделяются':'Ожидание'}</span></div>`;
    list.innerHTML=html;
}

setInterval(update, 250);
update();

function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); }
animate();
window.addEventListener('resize',()=>{
    camera.aspect=container.clientWidth/container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth,container.clientHeight);
});
</script>
</body>
</html>
