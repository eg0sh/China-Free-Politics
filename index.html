<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>China Space Live</title>
    <style>
        :root {
            --bg: #0a0a12; --surface: #111122; --border: #1a1a3a;
            --red: #cc0000; --gold: #ffcc00; --text: #e0e0e0; --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }
        .topbar {
            background: #080816;
            border-bottom: 1px solid var(--border);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--muted);
        }
        .topbar .brand { color: var(--red); font-weight: bold; font-size: 14px; letter-spacing: 1px; }

        /* Языковой переключатель */
        .lang-switch {
            display: flex;
            gap: 2px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .lang-switch button {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
        }
        .lang-switch button.active { background: var(--red); color: #fff; }
        .lang-switch button:hover:not(.active) { color: #fff; background: #1a1a30; }

        nav {
            background: var(--surface);
            padding: 0 30px;
            border-bottom: 2px solid var(--red);
            display: flex;
            gap: 0;
        }
        nav a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 16px 24px;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: 0.2s;
        }
        nav a:hover { color: #fff; background: #1a1a30; }
        nav a.active { color: #fff; border-bottom-color: var(--red); }
        .page { display: none; max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
        .page.active { display: block; }

        .timer-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .timer-box .timer-label {
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .timer-box .timer-value {
            font-size: clamp(28px, 5vw, 56px);
            font-weight: bold;
            color: var(--gold);
            font-family: 'Courier New', monospace;
            margin: 10px 0;
            word-break: break-all;
        }
        .timer-box .timer-sub {
            color: var(--muted);
            font-size: 14px;
            min-height: 20px;
        }
        .timer-box a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 24px;
            background: var(--red);
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .news-item {
            background: var(--surface);
            border-left: 4px solid var(--red);
            border-radius: 0 8px 8px 0;
            padding: 25px 30px;
            margin-bottom: 25px;
        }
        .news-time { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
        .news-flag { font-size: 28px; margin-right: 8px; vertical-align: middle; }
        .news-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 12px; }
        .news-body { color: #ccc; font-size: 15px; line-height: 1.8; }
        .news-body ul { margin: 10px 0 10px 20px; }
        .news-body li { margin-bottom: 6px; }
        .news-photo { margin-top: 18px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
        .news-photo img { width: 100%; display: block; }
        .news-photo .caption { background: #0a0a18; padding: 8px 14px; font-size: 12px; color: var(--muted); }

        footer { text-align: center; padding: 20px; color: #444; font-size: 12px; border-top: 1px solid #1a1a2a; margin-top: 40px; }
    </style>
</head>
<body>

<div class="topbar">
    <span class="brand">CHINA SPACE LIVE</span>
    <div class="lang-switch" id="lang-switch">
        <button onclick="switchLang('ru')" id="btn-ru" class="active">Русский</button>
        <button onclick="switchLang('en')" id="btn-en">English</button>
        <button onclick="switchLang('zh-CN')" id="btn-zh">中文</button>
    </div>
</div>

<div id="google_translate_element" style="display:none;"></div>

<nav>
    <a href="#" class="active" onclick="showPage('news'); return false;">📰 Новости</a>
    <a href="#" onclick="showPage('launches'); return false;">🚀 Запуски</a>
</nav>

<div class="page active" id="page-news">
    <div class="timer-box">
        <div class="timer-label" id="timer-label">Загрузка...</div>
        <div class="timer-value" id="timer-value">--:--:--:--</div>
        <div class="timer-sub" id="timer-sub"></div>
        <a href="#" onclick="showPage('launches'); return false;" id="timer-link" style="display:none;">📡 Перейти к запускам</a>
    </div>
    <div id="news-container"><p style="text-align:center;color:var(--muted);padding:40px;">Загрузка новостей...</p></div>
</div>

<div class="page" id="page-launches">
    <div id="launch-list"><p style="text-align:center;color:var(--muted);padding:40px;">Загрузка...</p></div>
</div>

<footer>China Space Live © 2026 · Данные в реальном времени</footer>

<script>
let currentLang = 'ru';

function switchLang(lang) {
    currentLang = lang;
    document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh-CN');
    
    // Меняем атрибут lang и перезапускаем Google Translate
    document.documentElement.lang = lang;
    const gt = document.querySelector('.goog-te-combo');
    if (gt) { gt.value = lang; gt.dispatchEvent(new Event('change')); }
    loadGoogleTranslate();
}

function loadGoogleTranslate() {
    const el = document.getElementById('google_translate_element');
    el.innerHTML = '';
    const script = document.createElement('script');
    script.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateInit';
    document.head.appendChild(script);
}

function googleTranslateInit() {
    new google.translate.TranslateElement({
        pageLanguage: 'ru',
        includedLanguages: 'ru,en,zh-CN',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
    }, 'google_translate_element');
}

function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    document.querySelectorAll('nav a').forEach(a => {
        if ((name === 'news' && a.textContent.includes('Новости')) || 
            (name === 'launches' && a.textContent.includes('Запуски'))) a.classList.add('active');
    });
}

// Новости
fetch('data/news.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const container = document.getElementById('news-container');
    container.innerHTML = '';
    data.news.sort((a,b) => new Date(b.time) - new Date(a.time)).forEach(item => {
      const div = document.createElement('div');
      div.className = 'news-item';
      let html = `<div class="news-time">⏰ ${new Date(item.time).toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'})} (UTC+8)</div>
        <div class="news-title"><span class="news-flag">${item.flag}</span> ${item.title}</div>
        <div class="news-body">${item.body}</div>`;
      if (item.photo) html += `<div class="news-photo"><img src="${item.photo.url}" alt=""><div class="caption">${item.photo.caption||''}</div></div>`;
      div.innerHTML = html;
      container.appendChild(div);
    });
  });

// Запуски
fetch('data/launches.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const container = document.getElementById('launch-list');
    container.innerHTML = '';
    data.launches.forEach(l => {
      const start = new Date(l.start_time);
      const div = document.createElement('div');
      div.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:25px;margin-bottom:20px;';
      div.innerHTML = `
        <h3 style="color:#fff;margin-bottom:5px;">${l.name}</h3>
        <p style="color:var(--muted);">🚀 ${l.rocket} · 📍 ${l.cosmodrome_full || l.cosmodrome} · ⏰ ${start.toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'})} (UTC+8)</p>
        <p style="color:#ccc;margin-top:8px;">${l.description || ''}</p>
        <a href="launch.html?id=${l.id}" style="display:inline-block;margin-top:15px;padding:10px 24px;background:var(--red);color:#fff;border-radius:6px;text-decoration:none;font-weight:bold;">📡 Детали запуска</a>
      `;
      container.appendChild(div);
    });
  });

// Таймер
fetch('data/launches.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const now = Date.now();
    let current = null, next = null;
    data.launches.sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
    for (const l of data.launches) {
      const t = new Date(l.start_time).getTime();
      if (t > now && !next) next = l;
      if (t <= now && t + (l.duration_sec||7200)*1000 > now) current = l;
    }
    
    const label = document.getElementById('timer-label');
    const val = document.getElementById('timer-value');
    const sub = document.getElementById('timer-sub');
    const link = document.getElementById('timer-link');
    
    if (current) {
      label.textContent = '🚀 ЗАПУСК В ПРОЦЕССЕ';
      val.textContent = current.name;
      sub.textContent = 'Старт: ' + new Date(current.start_time).toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'});
      link.style.display = 'inline-block';
    } else if (next) {
      label.textContent = '⏳ ДО СЛЕДУЮЩЕГО ЗАПУСКА';
      link.style.display = 'none';
      setInterval(() => {
        const diff = new Date(next.start_time).getTime() - Date.now();
        if (diff <= 0) { location.reload(); return; }
        const d = Math.floor(diff/86400000);
        const h = Math.floor((diff%86400000)/3600000);
        const m = Math.floor((diff%3600000)/60000);
        const s = Math.floor((diff%60000)/1000);
        val.textContent = `${d}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }, 250);
      sub.innerHTML = '<span class="timer-static">' + next.name + ' · ' + new Date(next.start_time).toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'}) + '</span>';
    } else {
      label.textContent = '📅 БЛИЖАЙШИХ ЗАПУСКОВ НЕТ';
      val.textContent = '—';
      sub.textContent = '';
      link.style.display = 'none';
    }
  });

loadGoogleTranslate();
</script>
</body>
</html>
