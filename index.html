<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>China Space Live</title>
    <style>
        :root { --bg: #0a0a12; --surface: #111122; --border: #1a1a3a; --red: #cc0000; --gold: #ffcc00; --text: #e0e0e0; --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; line-height: 1.6; }
        .topbar { background: #080816; border-bottom: 1px solid var(--border); padding: 8px 30px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); }
        .topbar .brand { color: var(--red); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        #google_translate_element { font-size: 12px; }
        nav { background: var(--surface); padding: 0 30px; border-bottom: 2px solid var(--red); display: flex; gap: 0; }
        nav a { color: #ccc; text-decoration: none; font-size: 15px; font-weight: 600; padding: 16px 24px; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: 0.2s; }
        nav a:hover { color: #fff; background: #1a1a30; }
        nav a.active { color: #fff; border-bottom-color: var(--red); }
        .page { display: none; max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
        .page.active { display: block; }
        .timer-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 25px 30px; text-align: center; margin-bottom: 30px; }
        .timer-box .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .timer-box .value { font-size: clamp(28px, 6vw, 48px); font-weight: bold; color: var(--gold); font-family: 'Courier New', monospace; margin: 10px 0; word-break: break-all; }
        .timer-box .sub { color: var(--muted); font-size: 14px; }
        .timer-box a { display: inline-block; margin-top: 15px; padding: 10px 24px; background: var(--red); color: #fff; border-radius: 6px; text-decoration: none; font-weight: bold; }
        .news-item { background: var(--surface); border-left: 4px solid var(--red); border-radius: 0 8px 8px 0; padding: 25px 30px; margin-bottom: 25px; }
        .news-time { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
        .news-flag { font-size: 28px; margin-right: 8px; vertical-align: middle; }
        .news-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 12px; }
        .news-body { color: #ccc; font-size: 15px; line-height: 1.8; }
        .news-body ul { margin: 10px 0 10px 20px; }
        .news-body li { margin-bottom: 6px; }
        .news-photo { margin-top: 18px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
        .news-photo img { width: 100%; display: block; }
        .news-photo .caption { background: #0a0a18; padding: 8px 14px; font-size: 12px; color: var(--muted); }
        .loading-text { text-align: center; padding: 40px; color: var(--muted); }
        footer { text-align: center; padding: 20px; color: #444; font-size: 12px; border-top: 1px solid #1a1a2a; margin-top: 40px; }
    </style>
</head>
<body>
<div class="topbar"><span class="brand">CHINA SPACE LIVE</span><div id="google_translate_element"></div></div>
<nav>
    <a href="#" class="active" onclick="showPage('news');return false;">📰 Новости</a>
    <a href="#" onclick="showPage('launches');return false;">🚀 Запуски</a>
</nav>
<div class="page active" id="page-news">
    <div class="timer-box" id="timer-box">
        <div class="label" id="timer-label">Загрузка...</div>
        <div class="value" id="timer-value">--:--:--:--</div>
        <div class="sub" id="timer-sub"></div>
        <a href="launch.html?id=ceos-1" id="timer-link" style="display:none;">📡 Перейти к трансляции</a>
    </div>
    <div id="news-container"><div class="loading-text">Загрузка новостей...</div></div>
</div>
<div class="page" id="page-launches"><div id="launch-container"><div class="loading-text">Загрузка...</div></div></div>
<footer>China Space Live © 2026</footer>
<script>
function googleTranslateInit(){new google.translate.TranslateElement({pageLanguage:'ru',includedLanguages:'ru,en,zh-CN',layout:google.translate.TranslateElement.InlineLayout.SIMPLE,autoDisplay:false},'google_translate_element');}
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateInit"></script>
<script>
function showPage(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));document.querySelectorAll('nav a')[n==='news'?0:1].classList.add('active');}
fetch('data/news.json?'+Date.now()).then(r=>r.json()).then(data=>{const c=document.getElementById('news-container');c.innerHTML='';data.news.sort((a,b)=>new Date(b.time)-new Date(a.time)).forEach(item=>{const d=document.createElement('div');d.className='news-item';let h=`<div class="news-time">⏰ ${new Date(item.time).toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'})} (UTC+8)</div><div class="news-title"><span class="news-flag">${item.flag}</span> ${item.title}</div><div class="news-body">${item.body}</div>`;if(item.photo)h+=`<div class="news-photo"><img src="${item.photo.url}" alt=""><div class="caption">${item.photo.caption||''}</div></div>`;d.innerHTML=h;c.appendChild(d);});}).catch(()=>document.getElementById('news-container').innerHTML='<div class="loading-text">Ошибка</div>');
fetch('data/launches.json?'+Date.now()).then(r=>r.json()).then(data=>{const c=document.getElementById('launch-container');c.innerHTML='';data.launches.forEach(l=>{const d=document.createElement('div');d.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:25px;margin-bottom:20px;';const s=new Date(l.start_time);d.innerHTML=`<h3 style="color:#fff;margin-bottom:5px;">${l.name}</h3><p style="color:var(--muted);margin-bottom:10px;">🚀 ${l.rocket} · 📍 ${l.cosmodrome} · ⏰ ${s.toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'})} (UTC+8)</p><p style="color:#ccc;">${l.description||''}</p><a href="launch.html?id=${l.id}" style="display:inline-block;margin-top:15px;padding:10px 24px;background:var(--red);color:#fff;border-radius:6px;text-decoration:none;font-weight:bold;">📡 Детали запуска</a> <a href="map.html" style="display:inline-block;margin-top:15px;margin-left:10px;padding:10px 24px;background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:6px;text-decoration:none;">🌌 Карта системы</a>`;c.appendChild(d);});}).catch(()=>document.getElementById('launch-container').innerHTML='<div class="loading-text">Ошибка</div>');
fetch('data/launches.json?'+Date.now()).then(r=>r.json()).then(data=>{const now=Date.now();let next=null;for(const l of data.launches.sort((a,b)=>new Date(a.start_time)-new Date(b.start_time))){if(new Date(l.start_time).getTime()>now){next=l;break;}}const tv=document.getElementById('timer-value'),tl=document.getElementById('timer-label'),ts=document.getElementById('timer-sub'),tlnk=document.getElementById('timer-link');if(next){tl.textContent='⏳ ДО СЛЕДУЮЩЕГО ЗАПУСКА';function u(){const diff=new Date(next.start_time).getTime()-Date.now();if(diff<=0){location.reload();return;}const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);tv.textContent=`${d}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;ts.textContent=next.name+' · '+new Date(next.start_time).toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'});}u();setInterval(u,500);}else{tl.textContent='📅 БЛИЖАЙШИХ ЗАПУСКОВ НЕТ';tv.textContent='—';ts.textContent='Расписание уточняется';}});
</script>
</body>
</html>
