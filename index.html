<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>China Space Live — Новости космической программы КНР</title>
    <style>
        :root {
            --bg: #08080f;
            --surface: #101018;
            --surface2: #161622;
            --border: #1e1e30;
            --red: #cc0000;
            --red-glow: #ff2222;
            --gold: #ffcc00;
            --text: #d0d0d8;
            --text2: #8888a0;
            --text3: #606070;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        .header {
            background: #0c0c18;
            border-bottom: 1px solid #1a1a30;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .logo {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
            color: #fff;
            text-decoration: none;
            white-space: nowrap;
        }
        .logo span { color: var(--red); }
        .nav-links { display: flex; gap: 0; }
        .nav-links a {
            color: var(--text2);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 16px 20px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-links a.active {
            color: #fff;
            border-bottom-color: var(--red);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .lang-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .lang-btn:hover { border-color: #444; background: #1e1e30; }
        .lang-menu {
            position: absolute;
            top: 48px;
            right: 32px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none;
            flex-direction: column;
            min-width: 120px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .lang-menu.show { display: flex; }
        .lang-menu button {
            background: none;
            border: none;
            color: var(--text);
            padding: 10px 16px;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
        }
        .lang-menu button:hover { background: rgba(255,255,255,0.05); }
        .lang-menu button.active { color: var(--red); }

        /* ── MAIN ── */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
            flex: 1;
        }

        /* ── LIVE BAR ── */
        .live-bar {
            background: linear-gradient(135deg, #1a0a0a, #0a0a1a);
            border: 1px solid #330000;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .live-dot {
            width: 10px;
            height: 10px;
            background: #00ff44;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,68,0.6); }
            50% { box-shadow: 0 0 0 12px rgba(0,255,68,0); }
        }
        .live-text { font-weight: 600; font-size: 14px; color: #fff; }
        .live-info { color: var(--text2); font-size: 13px; }
        .live-countdown {
            font-family: 'Courier New', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
        }
        .map-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .map-btn:hover { background: #1e1e30; border-color: #555; }

        /* ── NEWS ── */
        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text3);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .news-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px 32px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            position: relative;
        }
        .news-card:hover { border-color: #333; }
        .news-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .news-datetime {
            color: var(--text3);
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        .news-flag {
            font-size: 18px;
        }
        .news-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .news-body {
            color: var(--text);
            font-size: 15px;
            line-height: 1.8;
        }
        .news-body p { margin-bottom: 12px; }
        .news-body .highlight {
            background: rgba(255,204,0,0.1);
            border-left: 3px solid var(--gold);
            padding: 10px 14px;
            border-radius: 0 6px 6px 0;
            margin: 14px 0;
            font-size: 14px;
            color: var(--gold);
        }
        .news-body ul {
            margin: 12px 0 12px 20px;
        }
        .news-body ul li {
            margin-bottom: 6px;
        }
        .news-gallery {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .news-gallery img {
            border-radius: 8px;
            border: 1px solid var(--border);
            max-height: 200px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .news-gallery img:hover { transform: scale(1.02); }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text3);
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text3);
            font-size: 12px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo">🚀 <span>China</span> Space Live</a>
            <nav class="nav-links">
                <a href="index.html" class="active" data-lang-ru="Новости" data-lang-en="News" data-lang-zh="新闻">Новости</a>
                <a href="live/" data-lang-ru="Космическая программа" data-lang-en="Space Program" data-lang-zh="航天计划">Космическая программа</a>

        </div>

            <button class="lang-btn" onclick="toggleLangMenu()" id="langBtn">
                🌐 <span id="currentLang">RU</span> ▾

            <div class="lang-menu" id="langMenu">

                <button onclick="setLang('en')">🇬🇧 English</button>

            </div>

    </header>

    <!-- MAIN -->
    <main class="main-container">

        <!-- LIVE BAR -->
        <div class="live-bar">
            <div>
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    <span class="live-text" data-lang-ru="Следующий запуск" data-lang-en="Next Launch" data-lang-zh="下次发射">Следующий запуск</span>
                </div>
                <div class="live-info" data-lang-ru="CEOS-1 · Ракета CZ-5B · Космодром Вэньчан" data-lang-en="CEOS-1 · CZ-5B · Wenchang" data-lang-zh="CEOS-1 · CZ-5B · 文昌">CEOS-1 · Ракета CZ-5B · Космодром Вэньчан</div>
            </div>
            <div class="live-countdown" id="countdown">15 дн 12 ч 34 мин</div>
            <a href="map/" class="map-btn">🌌 <span data-lang-ru="Карта системы" data-lang-en="System Map" data-lang-zh="系统地图">Карта системы</span></a>
        </div>

        <!-- NEWS -->
        <div class="section-title" data-lang-ru="Лента новостей" data-lang-en="News Feed" data-lang-zh="新闻动态">Лента новостей</div>
        <div id="newsContainer"><div class="loading">Загрузка...</div></div>

    </main>

    <footer class="footer">
        China Space Live © 2026 · Данные обновляются в реальном времени
    </footer>

    <script>
        // ── LANGUAGE SYSTEM ──
        let currentLang = 'ru';
        const translations = {};

        function toggleLangMenu() {
            document.getElementById('langMenu').classList.toggle('show');
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.header-right')) {
                document.getElementById('langMenu').classList.remove('show');
            }
        });

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('currentLang').textContent = lang.toUpperCase();
            document.querySelectorAll('.lang-menu button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-menu button[onclick="setLang('${lang}')"]`).classList.add('active');
            document.getElementById('langMenu').classList.remove('show');
            applyTranslations();
        }

        function applyTranslations() {
            document.querySelectorAll('[data-lang-ru]').forEach(el => {
                const key = `data-lang-${currentLang}`;
                if (el.getAttribute(key)) {
                    el.textContent = el.getAttribute(key);
                }
            });
            // Retranslate news if already loaded
            if (window.allNews) renderNews(window.allNews);
        }

        // ── COUNTDOWN ──
        function updateCountdown() {
            const launch = new Date('2026-07-07T04:00:00+08:00').getTime();
            const now = Date.now();
            const diff = launch - now;
            if (diff <= 0) {
                document.getElementById('countdown').textContent = 'ЗАПУСК!';
                return;
            }
            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').textContent = 
                `${days}д ${String(hours).padStart(2,'0')}ч ${String(mins).padStart(2,'0')}м ${String(secs).padStart(2,'0')}с`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // ── NEWS ──

            {

                    <p>Медицинские комиссии начнутся в июле. Первичный отсев по анкетам — около 20%. К финальному этапу (сентябрь) дойдут не более 200 кандидатов, из которых комиссия отберёт 78 основных и 15 резервистов.</p>
