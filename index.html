<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Запуск — China Space Live</title>
    <style>
        :root{--bg:#0a0a12;--surface:#111122;--border:#1a1a3a;--red:#cc0000;--gold:#ffcc00;--text:#e0e0e0;--muted:#888}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:var(--text);font-family:'Segoe UI','Courier New',monospace;height:100vh;overflow:hidden;display:flex;touch-action:manipulation}
        #splash{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a0a2e 0%,#000010 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.6s}
        #splash.hidden{opacity:0;pointer-events:none}
        #splash .logo{width:100px;height:100px;position:relative;margin-bottom:25px}
        #splash .logo .ring{position:absolute;top:0;left:0;width:100%;height:100%;border:3px solid var(--red);border-radius:50%;animation:spin 2s linear infinite}
        #splash .logo .ring2{position:absolute;top:15%;left:15%;width:70%;height:70%;border:2px solid #4488ff;border-radius:50%;animation:spin 3s linear infinite reverse}
        #splash .logo .dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:#fff;border-radius:50%}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        #splash h1{color:#fff;font-size:34px;font-weight:300;letter-spacing:3px;text-align:center}
        #splash h1 span{color:var(--red);font-weight:700}
        #splash p{color:#888;margin-top:10px;font-size:15px;text-align:center;max-width:80%}
        #viewport{flex:1;position:relative}
        #viewport canvas{display:block}
        #panel{width:420px;background:var(--bg);border-left:2px solid var(--red);display:flex;flex-direction:column;overflow-y:auto;z-index:10}
        #panel .header{background:var(--surface);padding:20px;border-bottom:1px solid var(--border);text-align:center}
        #panel .header h2{color:#fff;font-size:16px;margin-bottom:5px;word-wrap:break-word}
        #panel .header .rocket-tag{display:inline-block;background:var(--red);color:#fff;padding:3px 12px;border-radius:20px;font-size:12px}
        .timer-big{font-size:clamp(28px,6vw,42px);font-weight:bold;color:var(--gold);text-align:center;padding:15px;font-family:'Courier New',monospace;letter-spacing:2px;word-break:break-all}
        .current-event{margin:10px 15px;padding:15px;background:var(--surface);border-left:4px solid var(--gold);border-radius:0 8px 8px 0;font-size:15px;line-height:1.5}
        .telemetry-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 15px;margin:10px 0}
        .telem-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
        .telem-card .val{font-size:clamp(16px,3vw,22px);font-weight:bold;color:var(--gold);font-family:'Courier New',monospace}
        .telem-card .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
        .objects-section{padding:0 15px;margin:10px 0}
        .objects-section h3{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:10px}
        .object-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0a0a18;font-size:13px}
        .object-row .name{color:#ccc}
        .object-row .status{padding:2px 10px;border-radius:10px;font-size:11px;font-weight:bold}
        .status-active{background:#004400;color:#00ff00}.status-separated{background:#444400;color:#ffcc00}.status-splash{background:#004466;color:#00aaff}.status-orbiting{background:#440044;color:#ff00ff}.status-waiting{background:#222244;color:#8888cc}
        .btn-row{display:flex;gap:10px;padding:15px}
        .btn{flex:1;padding:10px;text-align:center;border-radius:6px;text-decoration:none;font-weight:bold;font-size:13px}
        .btn-map{background:var(--red);color:#fff}.btn-back{background:transparent;color:var(--muted);border:1px solid #333}
        @media(max-width:900px){body{flex-direction:column}#viewport{height:50vh}#panel{width:100%;height:50vh}}
    </style>
</head>
<body>
<div id="splash"><div class="logo"><div class="ring"></div><div class="ring2"></div><div class="dot"></div></div><h1>China<span>Space</span>Live</h1><p>Отслеживание и Визуализация в Реальном Времени</p></div>
<div id="viewport"></div>
<div id="panel">
    <div class="header"><span class="rocket-tag" id="rocket-badge">CZ-5B</span><h2 id="mission-title">Загрузка...</h2><p style="font-size:12px;color:var(--muted);margin-top:4px" id="mission-date"></p></div>
    <div class="timer-big" id="timer">--:--:--:--</div>
    <div class="current-event" id="event-text">Загрузка...</div>
    <div class="telemetry-grid">
        <div class="telem-card"><div class="val" id="alt">0</div><div class="lbl">Высота (км)</div></div>
        <div class="telem-card"><div class="val" id="vel">0</div><div class="lbl">Скорость (км/с)</div></div>
        <div class="telem-card"><div class="val" id="stage-name">—</div><div class="lbl">Этап</div></div>
        <div class="telem-card"><div class="val" id="dist">0</div><div class="lbl">Пройдено (км)</div></div>
    </div>
    <div class="objects-section"><h3>📦 Компоненты</h3><div id="objects-list"></div></div>
    <div class="btn-row"><a href="map.html" class="btn btn-map">🌌 Карта системы</a><a href="index.html" class="btn btn-back">← На главную</a></div>
</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
setTimeout(()=>document.getElementById('splash').classList.add('hidden'),3000);
const container=document.getElementById('viewport');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x000011);
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.001,50000);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(container.clientWidth,container.clientHeight);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));container.appendChild(renderer.domElement);
const starsGeo=new THREE.BufferGeometry();const sv=[];
for(let i=0;i<3000;i++){const r=3000+Math.random()*5000,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);sv.push(r*Math.sin(ph)*Math.cos(th),r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph));}
starsGeo.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:1.5})));
const texLoader=new THREE.TextureLoader();
// Солнце
const sunGeom=new THREE.SphereGeometry(15,32,32);
const sunTex=texLoader.load('https://upload.wikimedia.org/wikipedia/commons/a/a4/Solarsystemscope_texture_8k_sun.jpg');
const sunMesh=new THREE.Mesh(sunGeom,new THREE.MeshBasicMaterial({map:sunTex}));
sunMesh.position.set(500,200,300);scene.add(sunMesh);
const sunLight=new THREE.PointLight(0xffffff,2,0,0);sunMesh.add(sunLight);
scene.add(new THREE.AmbientLight(0x333355,0.8));
// Земля
const earthShader=new THREE.ShaderMaterial({
    uniforms:{dayTex:{value:texLoader.load('https://i.postimg.cc/VvdQdfF6/Daytime_Earth.jpg')},nightTex:{value:texLoader.load('https://i.postimg.cc/brscsyRy/Night_Earth.jpg')},sunDir:{value:new THREE.Vector3()}},
    vertexShader:`varying vec2 vUv;varying vec3 vNorm;void main(){vUv=uv;vNorm=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec2 vUv;varying vec3 vNorm;uniform sampler2D dayTex;uniform sampler2D nightTex;uniform vec3 sunDir;void main(){float l=dot(normalize(vNorm),normalize(sunDir));l=clamp(l,0.0,1.0);vec4 d=texture2D(dayTex,vUv);vec4 n=texture2D(nightTex,vUv);float m=smoothstep(0.05,0.35,l);gl_FragColor=mix(n,d,m);gl_FragColor.rgb+=n.rgb*0.12*(1.0-m);}`
});
const earth=new THREE.Mesh(new THREE.SphereGeometry(6.371,64,64),earthShader);scene.add(earth);
scene.add(new THREE.Mesh(new THREE.SphereGeometry(6.45,64,64),new THREE.MeshPhongMaterial({color:0x4488ff,transparent:true,opacity:0.12})));
const padR=6.38;const padPhi=(90-19.6)*Math.PI/180;const padTheta=110.9*Math.PI/180;const padPos=new THREE.Vector3(padR*Math.sin(padPhi)*Math.cos(padTheta),padR*Math.cos(padPhi),padR*Math.sin(padPhi)*Math.sin(padTheta));
const padMarker=new THREE.Mesh(new THREE.ConeGeometry(0.08,0.3,8),new THREE.MeshPhongMaterial({color:0xffcc00,emissive:0x331100}));padMarker.position.copy(padPos);padMarker.lookAt(new THREE.Vector3(0,0,0));padMarker.rotateX(Math.PI/2);scene.add(padMarker);
const rocketGroup=new THREE.Group();rocketGroup.visible=false;scene.add(rocketGroup);
const S=0.003;
rocketGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(2.5*S,2.5*S,53.7*S,16),new THREE.MeshPhongMaterial({color:0xffffff}))).position.y=53.7*S/2;
const boosters=[];for(let i=0;i<4;i++){const bg=new THREE.Group();const bh=30*S;bg.add(new THREE.Mesh(new THREE.CylinderGeometry(1.5*S,1.5*S,bh,8),new THREE.MeshPhongMaterial({color:0xdddddd}))).position.y=bh/2;const a=i*Math.PI/2+Math.PI/4;bg.position.set(Math.cos(a)*0.012,0,Math.sin(a)*0.012);bg.userData={separated:false};rocketGroup.add(bg);boosters.push(bg);}
const upperStage=new THREE.Group();const uh=12*S;upperStage.add(new THREE.Mesh(new THREE.CylinderGeometry(2.1*S,2.1*S,uh,16),new THREE.MeshPhongMaterial({color:0xeeeeff}))).position.y=uh/2;upperStage.position.y=53.7*S+0.01;upperStage.userData={separated:false};rocketGroup.add(upperStage);
const fairing=new THREE.Mesh(new THREE.ConeGeometry(2.5*S,20.5*S,16),new THREE.MeshPhongMaterial({color:0xcccccc,transparent:true,opacity:0.6}));fairing.position.y=53.7*S+uh+20.5*S/2;fairing.userData={separated:false};rocketGroup.add(fairing);
const flame=new THREE.Mesh(new THREE.ConeGeometry(0.015,0.06,8),new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.9}));flame.position.y=-0.03;flame.rotation.x=Math.PI;rocketGroup.add(flame);
const trajPts=[];const trajLine=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({color:0xffcc00,transparent:true,opacity:0.5}));scene.add(trajLine);

let launchData=null,startTime=0,events=[],prepMessages=[],targetPos=padPos.clone(),camDist=25,camAngle=0,camPolar=0.5;
const params=new URLSearchParams(window.location.search);const launchId=params.get('id')||'ceos-1';
fetch('data/launches.json?'+Date.now()).then(r=>r.json()).then(data=>{
    launchData=data.launches.find(l=>l.id===launchId)||data.launches[0];
    document.getElementById('mission-title').textContent=launchData.name;
    document.getElementById('rocket-badge').textContent=launchData.rocket;
    document.getElementById('mission-date').textContent=new Date(launchData.start_time).toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'})+' (UTC+8)';
    startTime=new Date(launchData.start_time).getTime();events=launchData.events;prepMessages=launchData.prep_messages||[];
    update();setInterval(update,250);
}).catch(()=>document.getElementById('mission-title').textContent='Ошибка');

function update(){
    if(!launchData)return;
    const elapsed=(Date.now()-startTime)/1000;
    const abs=Math.abs(elapsed);
    const d=Math.floor(abs/86400),h=Math.floor((abs%86400)/3600),m=Math.floor((abs%3600)/60),s=Math.floor(abs%60);
    document.getElementById('timer').textContent=(elapsed<0?'T-':'T+')+`${d}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    
    if(elapsed<-300&&prepMessages.length>0){
        let msg=prepMessages[0];
        for(let i=prepMessages.length-1;i>=0;i--){if(prepMessages[i].t<=elapsed){msg=prepMessages[i];break;}}
        document.getElementById('event-text').textContent=msg.text;
        document.getElementById('stage-name').textContent='Подготовка';
        document.getElementById('alt').textContent='0';document.getElementById('vel').textContent='0';document.getElementById('dist').textContent='0';
        rocketGroup.visible=false;flame.visible=false;targetPos.copy(padPos);
        document.getElementById('objects-list').innerHTML='<div class="object-row"><span class="name">🔵 Центральный блок</span><span class="status status-waiting">Ожидание</span></div><div class="object-row"><span class="name">🟡 Ускорители (4)</span><span class="status status-waiting">Ожидание</span></div><div class="object-row"><span class="name">⚪ Обтекатель</span><span class="status status-waiting">Ожидание</span></div><div class="object-row"><span class="name">🟣 Блок выведения</span><span class="status status-waiting">Ожидание</span></div><div class="object-row"><span class="name">🛰️ 12 спутников</span><span class="status status-waiting">Ожидание</span></div>';
        return;
    }
    rocketGroup.visible=true;
    let cur=events[0],nxt=events[1]||events[0];
    for(let i=0;i<events.length;i++){if(events[i].t<=elapsed){cur=events[i];nxt=events[i+1]||events[i];}}
    document.getElementById('event-text').textContent=cur.text;document.getElementById('stage-name').textContent=cur.stage||'—';
    let alt=cur.alt||0,vel=cur.vel||0;
    if(cur!==nxt&&elapsed>cur.t&&elapsed<nxt.t){const p=(elapsed-cur.t)/(nxt.t-cur.t);alt=(cur.alt||0)+((nxt.alt||0)-(cur.alt||0))*p;vel=(cur.vel||0)+((nxt.vel||0)-(cur.vel||0))*p;}
    document.getElementById('alt').textContent=alt.toFixed(1);document.getElementById('vel').textContent=vel.toFixed(2);document.getElementById('dist').textContent=(alt*1.5).toFixed(0);
    if(elapsed>-300&&elapsed<600){const scaleAlt=alt*0.1;const dir=new THREE.Vector3(0,1,0.25).normalize();const pos=padPos.clone().add(dir.clone().multiplyScalar(scaleAlt));rocketGroup.position.copy(pos);rocketGroup.lookAt(new THREE.Vector3(0,0,0));trajPts.push(pos.clone());if(trajPts.length>500)trajPts.shift();trajLine.geometry.dispose();trajLine.geometry=new THREE.BufferGeometry().setFromPoints(trajPts);targetPos.copy(pos);}
    flame.visible=elapsed>-5&&elapsed<510;
    if(elapsed>=165&&!boosters[0].userData.separated)boosters.forEach(b=>{b.userData.separated=true;rocketGroup.remove(b);});
    if(elapsed>=260&&!fairing.userData.separated){fairing.userData.separated=true;rocketGroup.remove(fairing);}
    if(elapsed>=540&&!upperStage.userData.separated){upperStage.userData.separated=true;rocketGroup.remove(upperStage);}
    let html='';const cs=elapsed>540?'status-orbiting':(elapsed>510?'status-separated':'status-active');
    html+=`<div class="object-row"><span class="name">🔵 Центральный блок</span><span class="status ${cs}">${elapsed>540?'На орбите':(elapsed>510?'Выключен':'Активен')}</span></div>`;
    boosters.forEach((b,i)=>html+=`<div class="object-row"><span class="name">🟡 Ускоритель ${i+1}</span><span class="status ${b.userData.separated?'status-splash':'status-active'}">${b.userData.separated?'Разрушен':'Активен'}</span></div>`);
    html+=`<div class="object-row"><span class="name">⚪ Обтекатель</span><span class="status ${fairing.userData.separated?'status-splash':'status-active'}">${fairing.userData.separated?'Сброшен':'Активен'}</span></div>`;
    html+=`<div class="object-row"><span class="name">🟣 Блок выведения</span><span class="status ${upperStage.userData.separated?'status-orbiting':'status-active'}">${upperStage.userData.separated?'На орбите':'Активен'}</span></div>`;
    html+=`<div class="object-row"><span class="name">🛰️ 12 спутников</span><span class="status ${elapsed>5400?'status-orbiting':'status-waiting'}">${elapsed>5400?'На орбите':'Ожидание'}</span></div>`;
    document.getElementById('objects-list').innerHTML=html;
}
container.addEventListener('wheel',e=>{camDist=Math.max(3,Math.min(5000,camDist+e.deltaY*0.3));},{passive:true});
let ltX=0,ltY=0,isDrag=false,lastPD=0;
container.addEventListener('touchstart',e=>{if(e.touches.length===2){lastPD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}else if(e.touches.length===1){ltX=e.touches[0].clientX;ltY=e.touches[0].clientY;isDrag=true;}});
container.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);camDist=Math.max(3,Math.min(5000,camDist+(lastPD-d)*0.3));lastPD=d;}else if(e.touches.length===1&&isDrag){camAngle-=(e.touches[0].clientX-ltX)*0.005;camPolar=Math.max(-1.5,Math.min(1.5,camPolar+(e.touches[0].clientY-ltY)*0.005));ltX=e.touches[0].clientX;ltY=e.touches[0].clientY;}});
container.addEventListener('touchend',()=>isDrag=false);
container.addEventListener('mousedown',e=>{isDrag=true;ltX=e.clientX;ltY=e.clientY;});
window.addEventListener('mouseup',()=>isDrag=false);
window.addEventListener('mousemove',e=>{if(isDrag){camAngle-=(e.clientX-ltX)*0.005;camPolar=Math.max(-1.5,Math.min(1.5,camPolar+(e.clientY-ltY)*0.005));ltX=e.clientX;ltY=e.clientY;}});

function animate(){
    requestAnimationFrame(animate);
    // sunDir = направление от Земли к Солнцу
    const sunWorldPos=sunMesh.position.clone();
    const earthWorldPos=earth.position.clone();
    const dirToSun=sunWorldPos.sub(earthWorldPos).normalize();
    earthShader.uniforms.sunDir.value.copy(dirToSun);
    if(targetPos){const tp=targetPos;camera.position.lerp(new THREE.Vector3(tp.x+Math.cos(camAngle)*Math.cos(camPolar)*camDist,tp.y+Math.sin(camPolar)*camDist,tp.z+Math.sin(camAngle)*Math.cos(camPolar)*camDist),0.05);camera.lookAt(tp);}
    renderer.render(scene,camera);
}animate();
window.addEventListener('resize',()=>{camera.aspect=container.clientWidth/container.clientHeight;camera.updateProjectionMatrix();renderer.setSize(container.clientWidth,container.clientHeight);});
</script>
</body>
</html>
