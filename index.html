<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>China Space Live</title>
    <style>
        :root {
            --bg: #0a0a12; --surface: #111122; --border: #1a1a3a;
            --red: #cc0000; --gold: #ffcc00; --text: #e0e0e0; --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh; line-height: 1.6;
        }
        .topbar {
            background: #080816; border-bottom: 1px solid var(--border);
            padding: 8px 30px; display: flex; justify-content: space-between;
            align-items: center; font-size: 13px; color: var(--muted);
        }
        .topbar .brand { color: var(--red); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        #google_translate_element { font-size: 12px; }
        nav {
            background: var(--surface); padding: 0 30px;
            border-bottom: 2px solid var(--red); display: flex; gap: 0;
        }
        nav a {
            color: #ccc; text-decoration: none; font-size: 15px; font-weight: 600;
            padding: 16px 24px; border-bottom: 3px solid transparent; margin-bottom: -2px;
            transition: 0.2s;
        }
        nav a:hover { color: #fff; background: #1a1a30; }
        nav a.active { color: #fff; border-bottom-color: var(--red); }
        .page { display: none; max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
        .page.active { display: block; }

        .timer-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 25px 30px; text-align: center; margin-bottom: 30px;
        }
        .timer-box .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .timer-box .value {
            font-size: clamp(28px, 6vw, 48px); font-weight: bold; color: var(--gold);
            font-family: 'Courier New', monospace; margin: 10px 0; word-break: break-all;
        }
        .timer-box .sub { color: var(--muted); font-size: 14px; }
        .timer-box a {
            display: inline-block; margin-top: 15px; padding: 10px 24px;
            background: var(--red); color: #fff; border-radius: 6px;
            text-decoration: none; font-weight: bold;
        }

        .news-item {
            background: var(--surface); border-left: 4px solid var(--red);
            border-radius: 0 8px 8px 0; padding: 25px 30px; margin-bottom: 25px;
        }
        .news-time { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
        .news-flag { font-size: 28px; margin-right: 8px; vertical-align: middle; }
        .news-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 12px; }
        .news-body { color: #ccc; font-size: 15px; line-height: 1.8; }
        .news-body ul { margin: 10px 0 10px 20px; }
        .news-body li { margin-bottom: 6px; }
        .news-photo { margin-top: 18px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
        .news-photo img { width: 100%; display: block; }
        .news-photo .caption { background: #0a0a18; padding: 8px 14px; font-size: 12px; color: var(--muted); }
        .loading-text { text-align: center; padding: 40px; color: var(--muted); }

        footer { text-align: center; padding: 20px; color: #444; font-size: 12px; border-top: 1px solid #1a1a2a; margin-top: 40px; }
    </style>
</head>
<body>

<div class="topbar">
    <span class="brand">CHINA SPACE LIVE</span>
    <div id="google_translate_element"></div>
</div>

<nav>
    <a href="#" class="active" onclick="showPage('news'); return false;">📰 Новости</a>
    <a href="#" onclick="showPage('launches'); return false;">🚀 Запуски</a>
</nav>

<div class="page active" id="page-news">
    <div class="timer-box" id="timer-box">
        <div class="label" id="timer-label">Загрузка...</div>
        <div class="value" id="timer-value">--:--:--:--</div>
        <div class="sub" id="timer-sub"></div>
        <a href="launch.html?id=ceos-1" id="timer-link" style="display:none;">📡 Перейти к трансляции</a>
    </div>
    <div id="news-container"><div class="loading-text">Загрузка новостей...</div></div>
</div>

<div class="page" id="page-launches">
    <div id="launch-container"><div class="loading-text">Загрузка...</div></div>
</div>

<footer>China Space Live © 2026</footer>

<script>
function googleTranslateInit() {
    new google.translate.TranslateElement({
        pageLanguage: 'ru',
        includedLanguages: 'ru,en,zh-CN',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
    }, 'google_translate_element');
}
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateInit"></script>

<script>
function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    if (name === 'news') document.querySelectorAll('nav a')[0].classList.add('active');
    else document.querySelectorAll('nav a')[1].classList.add('active');
}

// Новости
fetch('data/news.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const container = document.getElementById('news-container');
    container.innerHTML = '';
    const sorted = data.news.sort((a,b) => new Date(b.time) - new Date(a.time));
    sorted.forEach(item => {
      const div = document.createElement('div');
      div.className = 'news-item';
      let html = `<div class="news-time">⏰ ${new Date(item.time).toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'})} (UTC+8)</div>
        <div class="news-title"><span class="news-flag">${item.flag}</span> ${item.title}</div>
        <div class="news-body">${item.body}</div>`;
      if (item.photo) {
        html += `<div class="news-photo"><img src="${item.photo.url}" alt=""><div class="caption">${item.photo.caption||''}</div></div>`;
      }
      div.innerHTML = html;
      container.appendChild(div);
    });
  })
  .catch(() => document.getElementById('news-container').innerHTML = '<div class="loading-text">Ошибка загрузки новостей</div>');

// Запуски
fetch('data/launches.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const container = document.getElementById('launch-container');
    container.innerHTML = '';
    data.launches.forEach(launch => {
      const div = document.createElement('div');
      div.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:25px;margin-bottom:20px;';
      const start = new Date(launch.start_time);
      div.innerHTML = `
        <h3 style="color:#fff;margin-bottom:5px;">${launch.name}</h3>
        <p style="color:var(--muted);margin-bottom:10px;">🚀 ${launch.rocket} · 📍 ${launch.cosmodrome} · ⏰ ${start.toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'})} (UTC+8)</p>
        <p style="color:#ccc;">${launch.description||''}</p>
        <a href="launch.html?id=${launch.id}" style="display:inline-block;margin-top:15px;padding:10px 24px;background:var(--red);color:#fff;border-radius:6px;text-decoration:none;font-weight:bold;">📡 Детали запуска</a>
        <a href="map.html" style="display:inline-block;margin-top:15px;margin-left:10px;padding:10px 24px;background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:6px;text-decoration:none;">🌌 Карта системы</a>`;
      container.appendChild(div);
    });
  })
  .catch(() => document.getElementById('launch-container').innerHTML = '<div class="loading-text">Ошибка загрузки</div>');

// Таймер
fetch('data/launches.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const now = Date.now();
    const launches = data.launches.sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
    let next = null;
    for (const l of launches) {
      if (new Date(l.start_time).getTime() > now) { next = l; break; }
    }
    const timerVal = document.getElementById('timer-value');
    const timerLabel = document.getElementById('timer-label');
    const timerSub = document.getElementById('timer-sub');
    const timerLink = document.getElementById('timer-link');
    if (next) {
      timerLabel.textContent = '⏳ ДО СЛЕДУЮЩЕГО ЗАПУСКА';
      function updateCountdown() {
        const diff = new Date(next.start_time).getTime() - Date.now();
        if (diff <= 0) { location.reload(); return; }
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        timerVal.textContent = `${d}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        timerSub.textContent = next.name + ' · ' + new Date(next.start_time).toLocaleString('ru-RU',{timeZone:'Asia/Shanghai'});
      }
      updateCountdown();
      setInterval(updateCountdown, 500);
    } else {
      timerLabel.textContent = '📅 БЛИЖАЙШИХ ЗАПУСКОВ НЕТ';
      timerVal.textContent = '—';
      timerSub.textContent = 'Расписание уточняется';
    }
  });
</script>
</body>
</html>
